<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0d0d1a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gainz">
<title>Gainz — Workout Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --bg:       #0d0d1a;
    --bg2:      #13131f;
    --bg3:      #1a1a2e;
    --card:     #1e1e30;
    --border:   #2a2a40;
    --red:      #ff3c5f;
    --red-dim:  #cc2244;
    --gold:     #f5c842;
    --green:    #39d98a;
    --blue:     #4f8ef7;
    --text:     #f0f0f8;
    --muted:    #7070a0;
    --input-bg: #252538;
    --radius:   16px;
    --radius-sm:10px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  /* ── App shell ──────────────────────────────────────── */
  #app { display: flex; flex-direction: column; height: 100dvh; }

  /* ── Header ─────────────────────────────────────────── */
  header {
    flex-shrink: 0;
    padding: 56px 20px 16px;
    background: linear-gradient(180deg, #0a0a14 0%, var(--bg) 100%);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-end; justify-content: space-between;
  }
  .app-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    letter-spacing: 3px;
    color: var(--text);
    line-height: 1;
  }
  .app-logo span { color: var(--red); }
  .header-date {
    font-size: 12px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    text-align: right;
    line-height: 1.6;
  }
  .header-date strong { color: var(--text); font-weight: 500; display: block; font-size: 13px; }

  /* ── Bottom nav ──────────────────────────────────────── */
  nav {
    flex-shrink: 0;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    background: var(--bg2);
    border-top: 1px solid var(--border);
    padding-bottom: env(safe-area-inset-bottom, 0px);
  }
  nav button {
    background: none; border: none; cursor: pointer;
    padding: 12px 4px 10px;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 10px; font-weight: 500;
    letter-spacing: 0.5px;
    transition: color 0.2s;
    text-transform: uppercase;
  }
  nav button.active { color: var(--red); }
  nav button svg { width: 22px; height: 22px; }

  /* ── Pages ───────────────────────────────────────────── */
  #pages { flex: 1; overflow: hidden; position: relative; }
  .page {
    position: absolute; inset: 0;
    overflow-y: auto;
    overscroll-behavior: contain;
    padding: 20px;
    opacity: 0; pointer-events: none;
    transform: translateY(12px);
    transition: opacity 0.25s, transform 0.25s;
  }
  .page.active { opacity: 1; pointer-events: all; transform: none; }

  /* ── Zone picker ─────────────────────────────────────── */
  .section-title {
    font-size: 11px; font-weight: 600; letter-spacing: 2px;
    text-transform: uppercase; color: var(--muted);
    margin-bottom: 14px;
  }

  .zones-grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;
    margin-bottom: 28px;
  }
  .zone-card {
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 14px;
    cursor: pointer;
    display: flex; flex-direction: column; gap: 8px;
    transition: border-color 0.2s, background 0.2s, transform 0.15s;
    position: relative; overflow: hidden;
  }
  .zone-card:active { transform: scale(0.97); }
  .zone-card.selected {
    border-color: var(--red);
    background: linear-gradient(135deg, #2a1020 0%, #1e1e30 100%);
  }
  .zone-card .zone-icon { font-size: 28px; line-height: 1; }
  .zone-card .zone-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px; letter-spacing: 1px; line-height: 1;
    color: var(--text);
  }
  .zone-card .zone-count {
    font-size: 11px; color: var(--muted); font-weight: 500;
  }
  .zone-card.selected .zone-count { color: var(--red); }
  .zone-card .zone-dot {
    position: absolute; top: 12px; right: 12px;
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--red); opacity: 0;
    transition: opacity 0.2s;
  }
  .zone-card.selected .zone-dot { opacity: 1; }

  /* ── Exercise list ───────────────────────────────────── */
  .exercises-section { display: none; }
  .exercises-section.visible { display: block; }

  .exercise-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 10px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 10px;
    align-items: center;
  }
  .ex-name {
    font-weight: 600; font-size: 15px;
    text-transform: capitalize;
    margin-bottom: 4px;
  }
  .ex-last {
    font-size: 12px; color: var(--green);
    font-family: 'DM Mono', monospace;
    display: flex; align-items: center; gap: 5px;
  }
  .ex-last::before {
    content: '↑';
    font-size: 10px;
    opacity: 0.7;
  }
  .ex-last.empty { color: var(--muted); }
  .ex-last.empty::before { content: '—'; }
  .ex-input {
    width: 130px;
    background: var(--input-bg);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    padding: 10px 12px;
    text-align: center;
    outline: none;
    transition: border-color 0.2s;
    user-select: text;
  }
  .ex-input:focus { border-color: var(--red); }
  .ex-input::placeholder { color: var(--muted); font-size: 11px; }

  /* ── Log button ──────────────────────────────────────── */
  .log-btn {
    width: 100%;
    background: var(--red);
    color: white;
    border: none;
    border-radius: var(--radius);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px; letter-spacing: 2px;
    padding: 18px;
    cursor: pointer;
    margin-top: 20px;
    transition: background 0.2s, transform 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 10px;
  }
  .log-btn:active { background: var(--red-dim); transform: scale(0.98); }
  .log-btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }

  /* ── Toast ───────────────────────────────────────────── */
  #toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--green); color: #0a1f14;
    font-weight: 600; font-size: 14px;
    padding: 12px 24px; border-radius: 999px;
    opacity: 0; transition: all 0.3s;
    z-index: 999; white-space: nowrap;
    pointer-events: none;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── History page ────────────────────────────────────── */
  .history-filters {
    display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto;
    padding-bottom: 4px; -webkit-overflow-scrolling: touch;
  }
  .filter-chip {
    flex-shrink: 0;
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 999px;
    padding: 6px 14px;
    font-size: 12px; font-weight: 500;
    color: var(--muted);
    cursor: pointer; transition: all 0.2s;
  }
  .filter-chip.active { border-color: var(--red); color: var(--red); background: #2a1020; }

  .history-entry {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 13px 15px;
    margin-bottom: 8px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .history-entry:first-of-type { border-color: var(--red); }
  .he-left .he-ex { font-weight: 600; font-size: 14px; text-transform: capitalize; }
  .he-left .he-zone {
    font-size: 11px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.5px;
    margin-top: 2px;
  }
  .he-right { text-align: right; }
  .he-value { font-family: 'DM Mono', monospace; font-size: 14px; color: var(--gold); }
  .he-date { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .history-day-label {
    font-size: 11px; font-weight: 600; letter-spacing: 2px;
    text-transform: uppercase; color: var(--muted);
    margin: 18px 0 8px;
  }
  .history-day-label:first-child { margin-top: 0; }

  .empty-state {
    text-align: center; padding: 60px 20px;
    color: var(--muted);
  }
  .empty-state .es-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; line-height: 1.6; }

  /* ── Stats page ──────────────────────────────────────── */
  .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
  .stat-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px;
  }
  .stat-value {
    font-family: 'Bebas Neue', sans-serif; font-size: 36px;
    color: var(--red); line-height: 1;
  }
  .stat-label { font-size: 11px; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }

  .pb-section { margin-top: 8px; }
  .pb-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 13px 0; border-bottom: 1px solid var(--border);
  }
  .pb-row:last-child { border-bottom: none; }
  .pb-ex { font-size: 13px; text-transform: capitalize; }
  .pb-val { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--gold); }

  /* scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<div id="app">
  <header>
    <div>
      <div class="app-logo">GAIN<span>Z</span></div>
    </div>
    <div class="header-date">
      <strong id="hdr-day">Monday</strong>
      <span id="hdr-date">01 Jan 2025</span>
    </div>
  </header>

  <div id="pages">
    <!-- ── PAGE: Log ── -->
    <div class="page active" id="page-log">
      <div class="section-title">Choose muscle zone</div>
      <div class="zones-grid" id="zones-grid"></div>

      <div class="exercises-section" id="exercises-section">
        <div class="section-title" id="ex-section-label">Exercises</div>
        <div id="exercises-list"></div>
        <button class="log-btn" id="log-btn" onclick="logWorkout()">
          <span>LOG WORKOUT</span>
        </button>
      </div>
    </div>

    <!-- ── PAGE: History ── -->
    <div class="page" id="page-history">
      <div class="section-title">Training history</div>
      <div class="history-filters" id="history-filters">
        <div class="filter-chip active" data-zone="All" onclick="filterHistory('All', this)">All</div>
      </div>
      <div id="history-list"></div>
    </div>

    <!-- ── PAGE: Stats ── -->
    <div class="page" id="page-stats">
      <div class="section-title">Overview</div>
      <div class="stats-grid" id="stats-grid"></div>
      <div class="section-title">Personal bests</div>
      <div class="pb-section" id="pb-section"></div>
    </div>
  </div>

  <nav>
    <button class="active" onclick="showPage('log', this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 4v16M10 4v16M14 4l4 0M14 12l4 0M14 20l4-4"/>
      </svg>
      Log
    </button>
    <button onclick="showPage('history', this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/>
      </svg>
      History
    </button>
    <button onclick="showPage('stats', this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 20h18M8 20V10M12 20V4M16 20v-6"/>
      </svg>
      Stats
    </button>
  </nav>
</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════
//  DATA
// ═══════════════════════════════════════════════════════════
const ZONES = {
  Chest:     { icon: '🫁', exercises: ['Pushups', 'Pec Dec', 'Chest Pullups', 'High Angle Press'] },
  Arms:      { icon: '💪', exercises: ['Triceps Push Rope', 'Triceps Push Handles', 'Biceps Rope', 'Biceps Handle'] },
  Shoulders: { icon: '🏔️', exercises: ['Lats', 'Shoulder Press', 'Rotations', 'Dumbbell Rotations'] },
  Back:      { icon: '🦅', exercises: ['Pullups', 'Rows', 'Flags', 'Pulldowns'] },
  Abs:       { icon: '🔥', exercises: ['Abs'] }
};

// ═══════════════════════════════════════════════════════════
//  STORAGE
// ═══════════════════════════════════════════════════════════
function getHistory() {
  try { return JSON.parse(localStorage.getItem('gainz_history') || '[]'); }
  catch { return []; }
}
function saveHistory(h) { localStorage.setItem('gainz_history', JSON.stringify(h)); }

function getLastRecord(zone, exercise) {
  const h = getHistory().filter(e => e.zone === zone && e.exercise === exercise);
  return h.length ? h[h.length - 1].value : null;
}

// ═══════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════
let selectedZone = null;
let historyFilter = 'All';

// ═══════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════
function init() {
  // Date header
  const now = new Date();
  document.getElementById('hdr-day').textContent =
    now.toLocaleDateString('en-GB', { weekday: 'long' });
  document.getElementById('hdr-date').textContent =
    now.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });

  // Build zones grid
  const grid = document.getElementById('zones-grid');
  Object.entries(ZONES).forEach(([name, data]) => {
    const card = document.createElement('div');
    card.className = 'zone-card';
    card.dataset.zone = name;
    card.innerHTML = `
      <div class="zone-dot"></div>
      <div class="zone-icon">${data.icon}</div>
      <div class="zone-name">${name}</div>
      <div class="zone-count">${data.exercises.length} exercise${data.exercises.length > 1 ? 's' : ''}</div>
    `;
    card.onclick = () => selectZone(name);
    grid.appendChild(card);
  });

  // Build history filters
  const filters = document.getElementById('history-filters');
  Object.keys(ZONES).forEach(zone => {
    const chip = document.createElement('div');
    chip.className = 'filter-chip';
    chip.dataset.zone = zone;
    chip.textContent = zone;
    chip.onclick = function() { filterHistory(zone, this); };
    filters.appendChild(chip);
  });
}

// ═══════════════════════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════════════════════
function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'history') renderHistory();
  if (name === 'stats')   renderStats();
}

// ═══════════════════════════════════════════════════════════
//  ZONE SELECTION
// ═══════════════════════════════════════════════════════════
function selectZone(zone) {
  selectedZone = zone;
  document.querySelectorAll('.zone-card').forEach(c => c.classList.toggle('selected', c.dataset.zone === zone));
  renderExercises(zone);
  document.getElementById('exercises-section').classList.add('visible');
  document.getElementById('ex-section-label').textContent = `${zone} exercises`;
  setTimeout(() => {
    document.getElementById('exercises-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 100);
}

// ═══════════════════════════════════════════════════════════
//  EXERCISES
// ═══════════════════════════════════════════════════════════
function renderExercises(zone) {
  const list = document.getElementById('exercises-list');
  list.innerHTML = '';
  ZONES[zone].exercises.forEach((ex, i) => {
    const last = getLastRecord(zone, ex);
    const card = document.createElement('div');
    card.className = 'exercise-card';
    card.innerHTML = `
      <div>
        <div class="ex-name">${ex}</div>
        <div class="ex-last ${last ? '' : 'empty'}">${last || 'No record yet'}</div>
      </div>
      <input
        class="ex-input"
        id="input-${i}"
        type="text"
        inputmode="text"
        placeholder="e.g. 80kg 3×10"
        autocomplete="off"
        spellcheck="false"
      >
    `;
    list.appendChild(card);
  });
}

// ═══════════════════════════════════════════════════════════
//  LOG WORKOUT
// ═══════════════════════════════════════════════════════════
function logWorkout() {
  if (!selectedZone) return;

  const exercises = ZONES[selectedZone].exercises;
  const today = new Date().toLocaleDateString('en-GB');
  const history = getHistory();
  let logged = 0;

  exercises.forEach((ex, i) => {
    const input = document.getElementById('input-' + i);
    const val = input ? input.value.trim() : '';
    if (val) {
      history.push({ date: today, zone: selectedZone, exercise: ex, value: val });
      logged++;
    }
  });

  if (logged === 0) {
    showToast('Fill in at least one exercise! 📝', '#ff3c5f');
    return;
  }

  saveHistory(history);

  // Clear inputs
  exercises.forEach((_, i) => {
    const input = document.getElementById('input-' + i);
    if (input) input.value = '';
  });

  // Refresh last records
  renderExercises(selectedZone);

  showToast(`✅ ${logged} exercise${logged > 1 ? 's' : ''} logged!`);
}

// ═══════════════════════════════════════════════════════════
//  HISTORY
// ═══════════════════════════════════════════════════════════
function filterHistory(zone, chipEl) {
  historyFilter = zone;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  chipEl.classList.add('active');
  renderHistory();
}

function renderHistory() {
  const list = document.getElementById('history-list');
  let data = getHistory().slice().reverse();
  if (historyFilter !== 'All') data = data.filter(e => e.zone === historyFilter);

  if (!data.length) {
    list.innerHTML = `<div class="empty-state">
      <div class="es-icon">🏋️</div>
      <p>No workouts yet.<br>Start logging and your history will appear here.</p>
    </div>`;
    return;
  }

  // Group by date
  const grouped = {};
  data.forEach(e => {
    if (!grouped[e.date]) grouped[e.date] = [];
    grouped[e.date].push(e);
  });

  list.innerHTML = '';
  Object.entries(grouped).forEach(([date, entries], gi) => {
    const label = document.createElement('div');
    label.className = 'history-day-label';
    label.textContent = formatDateLabel(date);
    list.appendChild(label);

    entries.forEach((e, ei) => {
      const row = document.createElement('div');
      row.className = 'history-entry';
      if (gi === 0 && ei === 0) row.style.borderColor = 'var(--red)';
      row.innerHTML = `
        <div class="he-left">
          <div class="he-ex">${e.exercise}</div>
          <div class="he-zone">${e.zone}</div>
        </div>
        <div class="he-right">
          <div class="he-value">${e.value}</div>
          <div class="he-date">${e.date}</div>
        </div>
      `;
      list.appendChild(row);
    });
  });
}

function formatDateLabel(dateStr) {
  const [d, m, y] = dateStr.split('/');
  const date = new Date(y, m - 1, d);
  const today = new Date(); today.setHours(0,0,0,0);
  const diff = Math.round((today - date) / 86400000);
  if (diff === 0) return 'Today';
  if (diff === 1) return 'Yesterday';
  if (diff < 7) return date.toLocaleDateString('en-GB', { weekday: 'long' });
  return date.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
}

// ═══════════════════════════════════════════════════════════
//  STATS
// ═══════════════════════════════════════════════════════════
function renderStats() {
  const history = getHistory();
  const totalSessions = new Set(history.map(e => e.date + e.zone)).size;
  const totalEntries  = history.length;
  const streak        = calcStreak(history);
  const topZone       = calcTopZone(history);

  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card">
      <div class="stat-value">${totalSessions}</div>
      <div class="stat-label">Sessions</div>
    </div>
    <div class="stat-card">
      <div class="stat-value">${streak}</div>
      <div class="stat-label">Day streak 🔥</div>
    </div>
    <div class="stat-card">
      <div class="stat-value">${totalEntries}</div>
      <div class="stat-label">Sets logged</div>
    </div>
    <div class="stat-card">
      <div class="stat-value">${topZone || '—'}</div>
      <div class="stat-label">Fav zone</div>
    </div>
  `;

  // Personal bests (last logged value per exercise)
  const pb = document.getElementById('pb-section');
  const bests = {};
  history.forEach(e => { bests[e.exercise] = e.value; });

  if (!Object.keys(bests).length) {
    pb.innerHTML = '<div class="empty-state" style="padding:30px 0"><p>Log your first workout to see personal bests.</p></div>';
    return;
  }

  pb.innerHTML = Object.entries(bests).map(([ex, val]) => `
    <div class="pb-row">
      <div class="pb-ex">${ex}</div>
      <div class="pb-val">${val}</div>
    </div>
  `).join('');
}

function calcStreak(history) {
  const dates = [...new Set(history.map(e => e.date))].sort().reverse();
  if (!dates.length) return 0;
  let streak = 0;
  const today = new Date(); today.setHours(0,0,0,0);
  for (let i = 0; i < dates.length; i++) {
    const [d, m, y] = dates[i].split('/');
    const date = new Date(y, m-1, d);
    const diff = Math.round((today - date) / 86400000);
    if (diff === i || diff === i + 1) streak++;
    else break;
  }
  return streak;
}

function calcTopZone(history) {
  const counts = {};
  history.forEach(e => { counts[e.zone] = (counts[e.zone] || 0) + 1; });
  return Object.entries(counts).sort((a,b) => b[1]-a[1])[0]?.[0] || null;
}

// ═══════════════════════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════════════════════
function showToast(msg, color = '#39d98a') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = color;
  t.style.color = color === '#39d98a' ? '#0a1f14' : 'white';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}
