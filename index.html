<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0d0d1a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gainz">
<title>Gainz — Workout Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --bg:       #0d0d1a;
    --bg2:      #13131f;
    --bg3:      #1a1a2e;
    --card:     #1e1e30;
    --border:   #2a2a40;
    --red:      #ff3c5f;
    --red-dim:  #cc2244;
    --gold:     #f5c842;
    --green:    #39d98a;
    --blue:     #4f8ef7;
    --text:     #f0f0f8;
    --muted:    #7070a0;
    --input-bg: #252538;
    --radius:   16px;
    --radius-sm:10px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: var(--bg); color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 15px;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  /* ── Loading splash ─────────────────────────────────── */
  #loading {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 9999;
  }
  #loading .splash-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 56px; letter-spacing: 5px;
  }
  #loading .splash-logo span { color: var(--red); }
  #loading .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--red);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-top: 24px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Auth screen ────────────────────────────────────── */
  #auth-screen {
    position: fixed; inset: 0;
    background: var(--bg);
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 20px; z-index: 100;
  }
  #auth-screen.visible { display: flex; }
  .auth-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 64px; letter-spacing: 6px;
    margin-bottom: 4px;
  }
  .auth-logo span { color: var(--red); }
  .auth-tagline {
    color: var(--muted); font-size: 12px;
    letter-spacing: 3px; text-transform: uppercase;
    margin-bottom: 48px;
  }
  .auth-card {
    width: 100%; max-width: 360px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
  }
  .auth-tabs { display: flex; gap: 4px; background: var(--bg2);
    border-radius: var(--radius-sm); padding: 4px; margin-bottom: 20px; }
  .auth-tab {
    flex: 1; padding: 10px; text-align: center;
    background: none; border: none; cursor: pointer;
    color: var(--muted); font-weight: 600; font-size: 13px;
    border-radius: 8px; font-family: inherit;
    text-transform: uppercase; letter-spacing: 1px;
    transition: all 0.2s;
  }
  .auth-tab.active { background: var(--card); color: var(--text); }
  .auth-input {
    width: 100%;
    background: var(--input-bg);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    padding: 14px 16px;
    font-size: 15px;
    font-family: inherit;
    margin-bottom: 12px;
    outline: none;
    user-select: text;
    transition: border-color 0.2s;
  }
  .auth-input:focus { border-color: var(--red); }
  .auth-btn {
    width: 100%;
    background: var(--red);
    color: white; border: none;
    border-radius: var(--radius-sm);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px; letter-spacing: 2px;
    padding: 14px; cursor: pointer;
    margin-top: 8px;
    transition: background 0.2s, transform 0.15s;
  }
  .auth-btn:active { background: var(--red-dim); transform: scale(0.98); }
  .auth-btn:disabled { background: var(--border); color: var(--muted); }
  .auth-error {
    color: var(--red); font-size: 13px; margin-top: 12px;
    text-align: center; min-height: 18px;
  }

  /* ── App shell ──────────────────────────────────────── */
  #app { display: none; flex-direction: column; height: 100dvh; }
  #app.visible { display: flex; }

  header {
    flex-shrink: 0;
    padding: 56px 20px 16px;
    background: linear-gradient(180deg, #0a0a14 0%, var(--bg) 100%);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-end; justify-content: space-between;
  }
  .app-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px; letter-spacing: 3px;
    color: var(--text); line-height: 1;
  }
  .app-logo span { color: var(--red); }
  .app-user {
    display: flex; flex-direction: column; align-items: flex-end; gap: 4px;
  }
  .app-user-info {
    font-size: 11px; color: var(--muted);
    font-family: 'DM Mono', monospace; line-height: 1.4;
    text-align: right;
  }
  .app-user-info strong { color: var(--text); font-weight: 500; display: block; font-size: 12px; }
  .signout-btn {
    background: none; border: 1px solid var(--border);
    color: var(--muted); font-size: 10px; font-family: inherit;
    padding: 4px 10px; border-radius: 999px; cursor: pointer;
    margin-top: 6px; letter-spacing: 0.5px; text-transform: uppercase;
  }
  .signout-btn:active { background: var(--card); }

  .sync-indicator {
    position: fixed; top: 60px; right: 20px;
    background: var(--card); border: 1px solid var(--border);
    color: var(--muted); font-size: 10px;
    padding: 4px 10px; border-radius: 999px;
    display: flex; align-items: center; gap: 6px;
    opacity: 0; transition: opacity 0.3s;
    z-index: 50; pointer-events: none;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .sync-indicator.show { opacity: 1; }
  .sync-indicator .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green); animation: pulse 1.5s infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }

  /* ── Bottom nav ──────────────────────────────────────── */
  nav {
    flex-shrink: 0;
    display: grid; grid-template-columns: repeat(3, 1fr);
    background: var(--bg2); border-top: 1px solid var(--border);
    padding-bottom: env(safe-area-inset-bottom, 0px);
  }
  nav button {
    background: none; border: none; cursor: pointer;
    padding: 12px 4px 10px;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    color: var(--muted); font-family: inherit;
    font-size: 10px; font-weight: 500; letter-spacing: 0.5px;
    transition: color 0.2s; text-transform: uppercase;
  }
  nav button.active { color: var(--red); }
  nav button svg { width: 22px; height: 22px; }

  /* ── Pages ───────────────────────────────────────────── */
  #pages { flex: 1; overflow: hidden; position: relative; }
  .page {
    position: absolute; inset: 0;
    overflow-y: auto; overscroll-behavior: contain;
    padding: 20px;
    opacity: 0; pointer-events: none;
    transform: translateY(12px);
    transition: opacity 0.25s, transform 0.25s;
  }
  .page.active { opacity: 1; pointer-events: all; transform: none; }

  .section-title {
    font-size: 11px; font-weight: 600; letter-spacing: 2px;
    text-transform: uppercase; color: var(--muted); margin-bottom: 14px;
  }

  .zones-grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;
    margin-bottom: 28px;
  }
  .zone-card {
    background: var(--card); border: 2px solid var(--border);
    border-radius: var(--radius); padding: 18px 14px;
    cursor: pointer; display: flex; flex-direction: column; gap: 8px;
    transition: border-color 0.2s, background 0.2s, transform 0.15s;
    position: relative; overflow: hidden;
  }
  .zone-card:active { transform: scale(0.97); }
  .zone-card.selected {
    border-color: var(--red);
    background: linear-gradient(135deg, #2a1020 0%, #1e1e30 100%);
  }
  .zone-card .zone-icon { font-size: 28px; line-height: 1; }
  .zone-card .zone-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px; letter-spacing: 1px; line-height: 1; color: var(--text);
  }
  .zone-card .zone-count { font-size: 11px; color: var(--muted); font-weight: 500; }
  .zone-card.selected .zone-count { color: var(--red); }
  .zone-card .zone-dot {
    position: absolute; top: 12px; right: 12px;
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--red); opacity: 0; transition: opacity 0.2s;
  }
  .zone-card.selected .zone-dot { opacity: 1; }

  .exercises-section { display: none; }
  .exercises-section.visible { display: block; }
  .exercise-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px;
    margin-bottom: 10px;
    display: grid; grid-template-columns: 1fr auto;
    gap: 10px; align-items: center;
  }
  .ex-name { font-weight: 600; font-size: 15px; text-transform: capitalize; margin-bottom: 4px; }
  .ex-last {
    font-size: 12px; color: var(--green);
    font-family: 'DM Mono', monospace;
    display: flex; align-items: center; gap: 5px;
  }
  .ex-last::before { content: '↑'; font-size: 10px; opacity: 0.7; }
  .ex-last.empty { color: var(--muted); }
  .ex-last.empty::before { content: '—'; }
  .ex-input {
    width: 130px; background: var(--input-bg);
    border: 1.5px solid var(--border); border-radius: var(--radius-sm);
    color: var(--text); font-family: 'DM Mono', monospace;
    font-size: 14px; padding: 10px 12px; text-align: center;
    outline: none; transition: border-color 0.2s; user-select: text;
  }
  .ex-input:focus { border-color: var(--red); }
  .ex-input::placeholder { color: var(--muted); font-size: 11px; }

  .log-btn {
    width: 100%; background: var(--red); color: white; border: none;
    border-radius: var(--radius);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px; letter-spacing: 2px;
    padding: 18px; cursor: pointer; margin-top: 20px;
    transition: background 0.2s, transform 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 10px;
  }
  .log-btn:active { background: var(--red-dim); transform: scale(0.98); }
  .log-btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }

  #toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--green); color: #0a1f14;
    font-weight: 600; font-size: 14px;
    padding: 12px 24px; border-radius: 999px;
    opacity: 0; transition: all 0.3s;
    z-index: 999; white-space: nowrap; pointer-events: none;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .history-filters {
    display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto;
    padding-bottom: 4px; -webkit-overflow-scrolling: touch;
  }
  .filter-chip {
    flex-shrink: 0; background: var(--card);
    border: 1.5px solid var(--border); border-radius: 999px;
    padding: 6px 14px; font-size: 12px; font-weight: 500;
    color: var(--muted); cursor: pointer; transition: all 0.2s;
  }
  .filter-chip.active { border-color: var(--red); color: var(--red); background: #2a1020; }

  .history-entry {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 13px 15px;
    margin-bottom: 8px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .he-left .he-ex { font-weight: 600; font-size: 14px; text-transform: capitalize; }
  .he-left .he-zone {
    font-size: 11px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px;
  }
  .he-right { text-align: right; }
  .he-value { font-family: 'DM Mono', monospace; font-size: 14px; color: var(--gold); }
  .he-date { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .history-day-label {
    font-size: 11px; font-weight: 600; letter-spacing: 2px;
    text-transform: uppercase; color: var(--muted); margin: 18px 0 8px;
  }
  .history-day-label:first-child { margin-top: 0; }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-state .es-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; line-height: 1.6; }

  .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
  .stat-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px;
  }
  .stat-value {
    font-family: 'Bebas Neue', sans-serif; font-size: 36px;
    color: var(--red); line-height: 1;
  }
  .stat-label { font-size: 11px; color: var(--muted); margin-top: 4px;
    text-transform: uppercase; letter-spacing: 0.5px; }

  .pb-section { margin-top: 8px; }
  .pb-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 13px 0; border-bottom: 1px solid var(--border);
  }
  .pb-row:last-child { border-bottom: none; }
  .pb-ex { font-size: 13px; text-transform: capitalize; }
  .pb-val { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--gold); }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<!-- ── Loading splash ── -->
<div id="loading">
  <div class="splash-logo">GAIN<span>Z</span></div>
  <div class="spinner"></div>
</div>

<!-- ── Auth screen ── -->
<div id="auth-screen">
  <div class="auth-logo">GAIN<span>Z</span></div>
  <div class="auth-tagline">No excuses</div>
  <div class="auth-card">
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="setAuthTab('login')">Log in</button>
      <button class="auth-tab" id="tab-signup" onclick="setAuthTab('signup')">Sign up</button>
    </div>
    <input class="auth-input" id="auth-email" type="email" inputmode="email" autocomplete="email" placeholder="Email" autocapitalize="off" autocorrect="off">
    <input class="auth-input" id="auth-password" type="password" autocomplete="current-password" placeholder="Password (min 6 chars)">
    <button class="auth-btn" id="auth-submit" onclick="doAuth()">LOG IN</button>
    <div class="auth-error" id="auth-error"></div>
  </div>
</div>

<!-- ── App ── -->
<div id="app">
  <header>
    <div>
      <div class="app-logo">GAIN<span>Z</span></div>
    </div>
    <div class="app-user">
      <div class="app-user-info">
        <strong id="hdr-day">Monday</strong>
        <span id="hdr-date">01 Jan 2025</span>
      </div>
      <button class="signout-btn" onclick="doSignOut()">Sign out</button>
    </div>
  </header>

  <div class="sync-indicator" id="sync-indicator">
    <div class="dot"></div><span id="sync-text">Synced</span>
  </div>

  <div id="pages">
    <div class="page active" id="page-log">
      <div class="section-title">Choose muscle zone</div>
      <div class="zones-grid" id="zones-grid"></div>
      <div class="exercises-section" id="exercises-section">
        <div class="section-title" id="ex-section-label">Exercises</div>
        <div id="exercises-list"></div>
        <button class="log-btn" id="log-btn" onclick="logWorkout()">
          <span>LOG WORKOUT</span>
        </button>
      </div>
    </div>
    <div class="page" id="page-history">
      <div class="section-title">Training history</div>
      <div class="history-filters" id="history-filters">
        <div class="filter-chip active" data-zone="All" onclick="filterHistory('All', this)">All</div>
      </div>
      <div id="history-list"></div>
    </div>
    <div class="page" id="page-stats">
      <div class="section-title">Overview</div>
      <div class="stats-grid" id="stats-grid"></div>
      <div class="section-title">Personal bests</div>
      <div class="pb-section" id="pb-section"></div>
    </div>
  </div>

  <nav>
    <button class="active" onclick="showPage('log', this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 4v16M10 4v16M14 4l4 0M14 12l4 0M14 20l4-4"/>
      </svg>
      Log
    </button>
    <button onclick="showPage('history', this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/>
      </svg>
      History
    </button>
    <button onclick="showPage('stats', this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 20h18M8 20V10M12 20V4M16 20v-6"/>
      </svg>
      Stats
    </button>
  </nav>
</div>

<div id="toast"></div>

<!-- ═════════════════════════════════════════════════════════════
     FIREBASE + APP LOGIC
     ═════════════════════════════════════════════════════════════ -->
<script type="module">
  // ── Firebase imports ────────────────────────────────────────
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import {
    getAuth, onAuthStateChanged,
    createUserWithEmailAndPassword, signInWithEmailAndPassword,
    signOut, setPersistence, browserLocalPersistence
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import {
    getFirestore, collection, addDoc, deleteDoc, doc,
    query, where, orderBy, onSnapshot, serverTimestamp,
    enableIndexedDbPersistence
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  // ── Firebase config (your gainz project) ────────────────────
  const firebaseConfig = {
    apiKey: "AIzaSyAoPEDcgzV4UWtSjoStMiNDAkwvy3c6YIE",
    authDomain: "gainz-84e30.firebaseapp.com",
    projectId: "gainz-84e30",
    storageBucket: "gainz-84e30.firebasestorage.app",
    messagingSenderId: "447692463742",
    appId: "1:447692463742:web:28d5ca62b53ba97b6b022f",
    measurementId: "G-Q31SH56W04"
  };

  const fbApp = initializeApp(firebaseConfig);
  const auth  = getAuth(fbApp);
  const db    = getFirestore(fbApp);

  // Offline persistence — works when you're at the gym with no signal
  try {
    await enableIndexedDbPersistence(db);
  } catch (err) {
    console.warn('Offline persistence unavailable:', err.code);
  }

  await setPersistence(auth, browserLocalPersistence);

  // ── Expose to window so inline onclick handlers work ────────
  window.__fb = { auth, db, collection, addDoc, query, where, orderBy,
                  onSnapshot, serverTimestamp, doc, deleteDoc,
                  signInWithEmailAndPassword, createUserWithEmailAndPassword,
                  signOut, onAuthStateChanged };

  // Trigger main app boot
  window.dispatchEvent(new Event('firebase-ready'));
</script>

<script>
// ═══════════════════════════════════════════════════════════
//  WORKOUT DATA + APP STATE
// ═══════════════════════════════════════════════════════════
const ZONES = {
  Chest:     { icon: '🫁', exercises: ['Pushups', 'Pec Dec', 'Chest Pullups', 'High Angle Press'] },
  Arms:      { icon: '💪', exercises: ['Triceps Push Rope', 'Triceps Push Handles', 'Biceps Rope', 'Biceps Handle'] },
  Shoulders: { icon: '🏔️', exercises: ['Lats', 'Shoulder Press', 'Rotations', 'Dumbbell Rotations'] },
  Back:      { icon: '🦅', exercises: ['Pullups', 'Rows', 'Flags', 'Pulldowns'] },
  Abs:       { icon: '🔥', exercises: ['Abs'] }
};

let selectedZone   = null;
let historyFilter  = 'All';
let historyCache   = [];      // mirror of Firestore data, sorted oldest→newest
let unsubscribeHistory = null;
let currentUser    = null;
let authMode       = 'login'; // 'login' | 'signup'

// ═══════════════════════════════════════════════════════════
//  BOOT — wait for Firebase to be ready
// ═══════════════════════════════════════════════════════════
window.addEventListener('firebase-ready', () => {
  const { auth, onAuthStateChanged } = window.__fb;

  // Header date
  const now = new Date();
  document.getElementById('hdr-day').textContent =
    now.toLocaleDateString('en-GB', { weekday: 'long' });
  document.getElementById('hdr-date').textContent =
    now.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });

  // Auth listener
  onAuthStateChanged(auth, (user) => {
    document.getElementById('loading').style.display = 'none';
    currentUser = user;

    if (user) {
      document.getElementById('auth-screen').classList.remove('visible');
      document.getElementById('app').classList.add('visible');
      buildZonesGrid();
      buildHistoryFilters();
      subscribeToHistory();
      maybeMigrateLocalData();
    } else {
      if (unsubscribeHistory) { unsubscribeHistory(); unsubscribeHistory = null; }
      historyCache = [];
      document.getElementById('app').classList.remove('visible');
      document.getElementById('auth-screen').classList.add('visible');
    }
  });
});

// ═══════════════════════════════════════════════════════════
//  AUTH UI
// ═══════════════════════════════════════════════════════════
function setAuthTab(mode) {
  authMode = mode;
  document.getElementById('tab-login').classList.toggle('active', mode === 'login');
  document.getElementById('tab-signup').classList.toggle('active', mode === 'signup');
  document.getElementById('auth-submit').textContent = mode === 'login' ? 'LOG IN' : 'CREATE ACCOUNT';
  document.getElementById('auth-error').textContent = '';
  document.getElementById('auth-password').autocomplete = mode === 'login' ? 'current-password' : 'new-password';
}

async function doAuth() {
  const email = document.getElementById('auth-email').value.trim();
  const pw    = document.getElementById('auth-password').value;
  const err   = document.getElementById('auth-error');
  const btn   = document.getElementById('auth-submit');

  err.textContent = '';
  if (!email || !pw) { err.textContent = 'Enter both email and password'; return; }
  if (pw.length < 6) { err.textContent = 'Password must be at least 6 characters'; return; }

  btn.disabled = true;
  btn.textContent = 'Loading...';

  const { auth, signInWithEmailAndPassword, createUserWithEmailAndPassword } = window.__fb;

  try {
    if (authMode === 'login') {
      await signInWithEmailAndPassword(auth, email, pw);
    } else {
      await createUserWithEmailAndPassword(auth, email, pw);
    }
  } catch (e) {
    err.textContent = friendlyError(e.code);
  } finally {
    btn.disabled = false;
    btn.textContent = authMode === 'login' ? 'LOG IN' : 'CREATE ACCOUNT';
  }
}

function friendlyError(code) {
  const m = {
    'auth/invalid-email':       'Invalid email address',
    'auth/email-already-in-use':'Email already registered — try logging in',
    'auth/wrong-password':      'Wrong password',
    'auth/user-not-found':      'No account with that email',
    'auth/weak-password':       'Password too weak (6+ characters)',
    'auth/network-request-failed': 'Network error — check your connection',
    'auth/invalid-credential':  'Wrong email or password'
  };
  return m[code] || 'Something went wrong — try again';
}

async function doSignOut() {
  const { auth, signOut } = window.__fb;
  await signOut(auth);
}

// ═══════════════════════════════════════════════════════════
//  FIRESTORE SYNC
// ═══════════════════════════════════════════════════════════
function subscribeToHistory() {
  if (!currentUser) return;
  const { db, collection, query, orderBy, onSnapshot } = window.__fb;

  showSync('Syncing...');

  const q = query(
    collection(db, 'users', currentUser.uid, 'entries'),
    orderBy('ts', 'asc')
  );
  unsubscribeHistory = onSnapshot(q,
    (snap) => {
      historyCache = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      hideSync();
      // Refresh the visible page
      const active = document.querySelector('.page.active');
      if (active) {
        if (active.id === 'page-log' && selectedZone)   renderExercises(selectedZone);
        if (active.id === 'page-history')               renderHistory();
        if (active.id === 'page-stats')                 renderStats();
      }
    },
    (err) => {
      console.error('Sync error:', err);
      showSync('Offline', '#f5c842');
    }
  );
}

async function addEntry(date, zone, exercise, value) {
  if (!currentUser) return;
  const { db, collection, addDoc, serverTimestamp } = window.__fb;
  await addDoc(collection(db, 'users', currentUser.uid, 'entries'), {
    date, zone, exercise, value,
    ts: serverTimestamp()
  });
}

function getLastRecord(zone, exercise) {
  const matches = historyCache.filter(e => e.zone === zone && e.exercise === exercise);
  return matches.length ? matches[matches.length - 1].value : null;
}

// One-time migration: if Firestore is empty and localStorage has entries, push them up
async function maybeMigrateLocalData() {
  // Wait a bit for the first onSnapshot to complete
  setTimeout(async () => {
    if (historyCache.length > 0) return;
    let local;
    try { local = JSON.parse(localStorage.getItem('gainz_history') || '[]'); }
    catch { return; }
    if (!Array.isArray(local) || local.length === 0) return;

    showToast(`Importing ${local.length} entries from this device...`, '#4f8ef7');
    for (const e of local) {
      try {
        await addEntry(e.date, e.zone, e.exercise, e.value);
      } catch (err) { console.error('Migrate err:', err); }
    }
    localStorage.removeItem('gainz_history');
    showToast(`✅ Imported ${local.length} entries`);
  }, 1500);
}

// ═══════════════════════════════════════════════════════════
//  UI BUILDERS
// ═══════════════════════════════════════════════════════════
function buildZonesGrid() {
  const grid = document.getElementById('zones-grid');
  if (grid.children.length) return;
  Object.entries(ZONES).forEach(([name, data]) => {
    const card = document.createElement('div');
    card.className = 'zone-card';
    card.dataset.zone = name;
    card.innerHTML = `
      <div class="zone-dot"></div>
      <div class="zone-icon">${data.icon}</div>
      <div class="zone-name">${name}</div>
      <div class="zone-count">${data.exercises.length} exercise${data.exercises.length > 1 ? 's' : ''}</div>
    `;
    card.onclick = () => selectZone(name);
    grid.appendChild(card);
  });
}

function buildHistoryFilters() {
  const filters = document.getElementById('history-filters');
  if (filters.children.length > 1) return;
  Object.keys(ZONES).forEach(zone => {
    const chip = document.createElement('div');
    chip.className = 'filter-chip';
    chip.dataset.zone = zone;
    chip.textContent = zone;
    chip.onclick = function() { filterHistory(zone, this); };
    filters.appendChild(chip);
  });
}

// ═══════════════════════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════════════════════
function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'history') renderHistory();
  if (name === 'stats')   renderStats();
}

function selectZone(zone) {
  selectedZone = zone;
  document.querySelectorAll('.zone-card').forEach(c => c.classList.toggle('selected', c.dataset.zone === zone));
  renderExercises(zone);
  document.getElementById('exercises-section').classList.add('visible');
  document.getElementById('ex-section-label').textContent = `${zone} exercises`;
  setTimeout(() => {
    document.getElementById('exercises-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 100);
}

// ═══════════════════════════════════════════════════════════
//  EXERCISES (log page)
// ═══════════════════════════════════════════════════════════
function renderExercises(zone) {
  const list = document.getElementById('exercises-list');
  // preserve current input values during re-render
  const current = {};
  list.querySelectorAll('input').forEach(i => { current[i.id] = i.value; });

  list.innerHTML = '';
  ZONES[zone].exercises.forEach((ex, i) => {
    const last = getLastRecord(zone, ex);
    const card = document.createElement('div');
    card.className = 'exercise-card';
    card.innerHTML = `
      <div>
        <div class="ex-name">${ex}</div>
        <div class="ex-last ${last ? '' : 'empty'}">${last || 'No record yet'}</div>
      </div>
      <input class="ex-input" id="input-${i}" type="text" inputmode="text"
             placeholder="e.g. 80kg 3×10" autocomplete="off" spellcheck="false"
             value="${current['input-' + i] || ''}">
    `;
    list.appendChild(card);
  });
}

// ═══════════════════════════════════════════════════════════
//  LOG WORKOUT (writes to Firestore)
// ═══════════════════════════════════════════════════════════
async function logWorkout() {
  if (!selectedZone || !currentUser) return;

  const exercises = ZONES[selectedZone].exercises;
  const today = new Date().toLocaleDateString('en-GB');
  let logged = 0;

  showSync('Saving...');
  const writes = [];
  exercises.forEach((ex, i) => {
    const input = document.getElementById('input-' + i);
    const val = input ? input.value.trim() : '';
    if (val) {
      writes.push(addEntry(today, selectedZone, ex, val));
      logged++;
    }
  });

  if (logged === 0) {
    hideSync();
    showToast('Fill in at least one exercise! 📝', '#ff3c5f');
    return;
  }

  try {
    await Promise.all(writes);
    exercises.forEach((_, i) => {
      const input = document.getElementById('input-' + i);
      if (input) input.value = '';
    });
    hideSync();
    showToast(`✅ ${logged} exercise${logged > 1 ? 's' : ''} logged!`);
  } catch (e) {
    console.error(e);
    hideSync();
    showToast('Saved locally, will sync when online', '#f5c842');
  }
}

// ═══════════════════════════════════════════════════════════
//  HISTORY
// ═══════════════════════════════════════════════════════════
function filterHistory(zone, chipEl) {
  historyFilter = zone;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  chipEl.classList.add('active');
  renderHistory();
}

function renderHistory() {
  const list = document.getElementById('history-list');
  let data = historyCache.slice().reverse();
  if (historyFilter !== 'All') data = data.filter(e => e.zone === historyFilter);

  if (!data.length) {
    list.innerHTML = `<div class="empty-state">
      <div class="es-icon">🏋️</div>
      <p>No workouts yet.<br>Start logging and your history will appear here.</p>
    </div>`;
    return;
  }

  const grouped = {};
  data.forEach(e => { if (!grouped[e.date]) grouped[e.date] = []; grouped[e.date].push(e); });

  list.innerHTML = '';
  Object.entries(grouped).forEach(([date, entries], gi) => {
    const label = document.createElement('div');
    label.className = 'history-day-label';
    label.textContent = formatDateLabel(date);
    list.appendChild(label);

    entries.forEach((e, ei) => {
      const row = document.createElement('div');
      row.className = 'history-entry';
      if (gi === 0 && ei === 0) row.style.borderColor = 'var(--red)';
      row.innerHTML = `
        <div class="he-left">
          <div class="he-ex">${e.exercise}</div>
          <div class="he-zone">${e.zone}</div>
        </div>
        <div class="he-right">
          <div class="he-value">${e.value}</div>
          <div class="he-date">${e.date}</div>
        </div>
      `;
      list.appendChild(row);
    });
  });
}

function formatDateLabel(dateStr) {
  const [d, m, y] = dateStr.split('/');
  const date = new Date(y, m - 1, d);
  const today = new Date(); today.setHours(0,0,0,0);
  const diff = Math.round((today - date) / 86400000);
  if (diff === 0) return 'Today';
  if (diff === 1) return 'Yesterday';
  if (diff < 7)   return date.toLocaleDateString('en-GB', { weekday: 'long' });
  return date.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
}

// ═══════════════════════════════════════════════════════════
//  STATS
// ═══════════════════════════════════════════════════════════
function renderStats() {
  const totalSessions = new Set(historyCache.map(e => e.date + e.zone)).size;
  const totalEntries  = historyCache.length;
  const streak        = calcStreak(historyCache);
  const topZone       = calcTopZone(historyCache);

  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card"><div class="stat-value">${totalSessions}</div><div class="stat-label">Sessions</div></div>
    <div class="stat-card"><div class="stat-value">${streak}</div><div class="stat-label">Day streak 🔥</div></div>
    <div class="stat-card"><div class="stat-value">${totalEntries}</div><div class="stat-label">Sets logged</div></div>
    <div class="stat-card"><div class="stat-value">${topZone || '—'}</div><div class="stat-label">Fav zone</div></div>
  `;

  const pb = document.getElementById('pb-section');
  const bests = {};
  historyCache.forEach(e => { bests[e.exercise] = e.value; });

  if (!Object.keys(bests).length) {
    pb.innerHTML = '<div class="empty-state" style="padding:30px 0"><p>Log your first workout to see personal bests.</p></div>';
    return;
  }
  pb.innerHTML = Object.entries(bests).map(([ex, val]) => `
    <div class="pb-row"><div class="pb-ex">${ex}</div><div class="pb-val">${val}</div></div>
  `).join('');
}

function calcStreak(history) {
  const dates = [...new Set(history.map(e => e.date))].sort().reverse();
  if (!dates.length) return 0;
  let streak = 0;
  const today = new Date(); today.setHours(0,0,0,0);
  for (let i = 0; i < dates.length; i++) {
    const [d, m, y] = dates[i].split('/');
    const date = new Date(y, m-1, d);
    const diff = Math.round((today - date) / 86400000);
    if (diff === i || diff === i + 1) streak++;
    else break;
  }
  return streak;
}

function calcTopZone(history) {
  const counts = {};
  history.forEach(e => { counts[e.zone] = (counts[e.zone] || 0) + 1; });
  return Object.entries(counts).sort((a,b) => b[1]-a[1])[0]?.[0] || null;
}

// ═══════════════════════════════════════════════════════════
//  TOAST + SYNC INDICATOR
// ═══════════════════════════════════════════════════════════
function showToast(msg, color = '#39d98a') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = color;
  t.style.color = (color === '#39d98a') ? '#0a1f14' : 'white';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function showSync(text = 'Syncing...', color = '#39d98a') {
  const ind = document.getElementById('sync-indicator');
  document.getElementById('sync-text').textContent = text;
  ind.querySelector('.dot').style.background = color;
  ind.classList.add('show');
}
function hideSync() {
  setTimeout(() => document.getElementById('sync-indicator').classList.remove('show'), 600);
}

// expose for inline handlers
window.setAuthTab  = setAuthTab;
window.doAuth      = doAuth;
window.doSignOut   = doSignOut;
window.showPage    = showPage;
window.logWorkout  = logWorkout;
window.filterHistory = filterHistory;
</script>
