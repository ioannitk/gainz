<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0d0d1a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gainz">
<title>Gainz — Workout Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>

<style>
  :root {
    --bg:       #0d0d1a;
    --bg2:      #13131f;
    --card:     #1e1e30;
    --border:   #2a2a40;
    --red:      #ff3c5f;
    --red-dim:  #cc2244;
    --gold:     #f5c842;
    --green:    #39d98a;
    --blue:     #4f8ef7;
    --text:     #f0f0f8;
    --muted:    #7070a0;
    --input-bg: #252538;
    --radius:   16px;
    --radius-sm:10px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%; background: var(--bg); color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 15px;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent; user-select: none;
  }

  #loading {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; z-index: 9999;
  }
  #loading .splash-logo { font-family: 'Bebas Neue', sans-serif; font-size: 56px; letter-spacing: 5px; }
  #loading .splash-logo span { color: var(--red); }
  #loading .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border); border-top-color: var(--red);
    border-radius: 50%; animation: spin 0.8s linear infinite; margin-top: 24px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #auth-screen {
    position: fixed; inset: 0; background: var(--bg);
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 20px; z-index: 100;
  }
  #auth-screen.visible { display: flex; }
  .auth-logo { font-family: 'Bebas Neue', sans-serif; font-size: 64px; letter-spacing: 6px; margin-bottom: 4px; }
  .auth-logo span { color: var(--red); }
  .auth-tagline { color: var(--muted); font-size: 12px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 48px; }
  .auth-card { width: 100%; max-width: 360px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; }
  .auth-tabs { display: flex; gap: 4px; background: var(--bg2); border-radius: var(--radius-sm); padding: 4px; margin-bottom: 20px; }
  .auth-tab { flex: 1; padding: 10px; text-align: center; background: none; border: none; cursor: pointer;
    color: var(--muted); font-weight: 600; font-size: 13px; border-radius: 8px; font-family: inherit;
    text-transform: uppercase; letter-spacing: 1px; transition: all 0.2s; }
  .auth-tab.active { background: var(--card); color: var(--text); }
  .auth-input { width: 100%; background: var(--input-bg); border: 1.5px solid var(--border); border-radius: var(--radius-sm);
    color: var(--text); padding: 14px 16px; font-size: 15px; font-family: inherit; margin-bottom: 12px;
    outline: none; user-select: text; transition: border-color 0.2s; }
  .auth-input:focus { border-color: var(--red); }
  .auth-btn { width: 100%; background: var(--red); color: white; border: none;
    border-radius: var(--radius-sm); font-family: 'Bebas Neue', sans-serif;
    font-size: 18px; letter-spacing: 2px; padding: 14px; cursor: pointer; margin-top: 8px;
    transition: background 0.2s, transform 0.15s; }
  .auth-btn:active { background: var(--red-dim); transform: scale(0.98); }
  .auth-btn:disabled { background: var(--border); color: var(--muted); }
  .auth-error { color: var(--red); font-size: 13px; margin-top: 12px; text-align: center; min-height: 18px; }

  #app { display: none; flex-direction: column; height: 100dvh; }
  #app.visible { display: flex; }

  header {
    flex-shrink: 0;
    padding: 56px 20px 16px;
    background: linear-gradient(180deg, #0a0a14 0%, var(--bg) 100%);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-end; justify-content: space-between;
  }
  .app-logo { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 3px; color: var(--text); line-height: 1; }
  .app-logo span { color: var(--red); }
  .app-user { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
  .app-user-info { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; line-height: 1.4; text-align: right; }
  .app-user-info strong { color: var(--text); font-weight: 500; display: block; font-size: 12px; }
  .header-actions { display: flex; gap: 6px; margin-top: 6px; }
  .icon-btn { background: none; border: 1px solid var(--border); color: var(--muted); font-size: 10px; font-family: inherit;
    padding: 5px 10px; border-radius: 999px; cursor: pointer; letter-spacing: 0.5px; text-transform: uppercase;
    display: inline-flex; align-items: center; gap: 4px; }
  .icon-btn:active { background: var(--card); }
  .icon-btn svg { width: 12px; height: 12px; }

  .sync-indicator {
    position: fixed; top: 60px; right: 20px;
    background: var(--card); border: 1px solid var(--border); color: var(--muted);
    font-size: 10px; padding: 4px 10px; border-radius: 999px;
    display: flex; align-items: center; gap: 6px;
    opacity: 0; transition: opacity 0.3s;
    z-index: 50; pointer-events: none;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .sync-indicator.show { opacity: 1; }
  .sync-indicator .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }

  nav {
    flex-shrink: 0;
    display: grid; grid-template-columns: repeat(4, 1fr);
    background: var(--bg2); border-top: 1px solid var(--border);
    padding-bottom: env(safe-area-inset-bottom, 0px);
  }
  nav button { background: none; border: none; cursor: pointer;
    padding: 12px 4px 10px;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    color: var(--muted); font-family: inherit;
    font-size: 10px; font-weight: 500; letter-spacing: 0.5px;
    transition: color 0.2s; text-transform: uppercase; }
  nav button.active { color: var(--red); }
  nav button svg { width: 22px; height: 22px; }

  #pages { flex: 1; overflow: hidden; position: relative; }
  .page { position: absolute; inset: 0; overflow-y: auto; overscroll-behavior: contain; padding: 20px;
    opacity: 0; pointer-events: none; transform: translateY(12px);
    transition: opacity 0.25s, transform 0.25s; }
  .page.active { opacity: 1; pointer-events: all; transform: none; }

  .section-title { font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }

  .zones-grid { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
  .zone-card {
    background: var(--card); border: 2px solid var(--border);
    border-radius: var(--radius); padding: 16px 18px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative; overflow: hidden;
    display: flex; align-items: center; gap: 14px;
  }
  .zone-card:active { background: var(--bg2); }
  .zone-card.selected { border-color: var(--red); background: linear-gradient(135deg, #2a1020 0%, #1e1e30 100%); }

  /* Completion states (today) */
  .zone-card.complete {
    border-color: var(--green);
    background: linear-gradient(135deg, #0d2a1a 0%, #1e1e30 100%);
  }
  .zone-card.complete .zone-name { color: var(--green); }
  .zone-card.complete .zone-count { color: var(--green); }
  .zone-card.complete.selected { border-color: var(--green); box-shadow: 0 0 0 1.5px var(--green); }
  .zone-card.incomplete:not(.selected) { animation: gentleRedPulse 2.4s ease-in-out infinite; }
  @keyframes gentleRedPulse {
    0%, 100% { border-color: var(--border); box-shadow: 0 0 0 0 rgba(255, 60, 95, 0); }
    50% { border-color: rgba(255, 60, 95, 0.55); box-shadow: 0 0 0 3px rgba(255, 60, 95, 0.10); }
  }

  .zone-card .zone-icon { font-size: 26px; line-height: 1; flex-shrink: 0; }
  .zone-card .zone-info { flex: 1; min-width: 0; }
  .zone-card .zone-name { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 1.5px; line-height: 1; color: var(--text); }
  .zone-card .zone-count { font-size: 11px; color: var(--muted); font-weight: 500; margin-top: 4px;
    text-transform: uppercase; letter-spacing: 0.5px; }
  .zone-card.selected .zone-count { color: var(--red); }
  .zone-card .zone-chevron {
    flex-shrink: 0; color: var(--muted);
    transition: transform 0.3s ease, color 0.2s;
    width: 20px; height: 20px;
  }
  .zone-card.selected .zone-chevron { transform: rotate(180deg); color: var(--red); }
  .zone-card.complete .zone-chevron { color: var(--green); }
  .zone-card .zone-check {
    position: absolute; top: 10px; right: 44px;
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--green); color: #0a1f14;
    display: none; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700;
  }
  .zone-card.complete .zone-check { display: flex; }

  /* ── Accordion body for exercises ─────────────────── */
  .zone-block { margin-bottom: 10px; }
  .zone-exercises {
    overflow: hidden;
    max-height: 0;
    opacity: 0;
    transition: max-height 0.35s ease, opacity 0.25s ease, margin 0.25s ease;
    margin-top: 0;
  }
  .zone-exercises.expanded {
    max-height: 2000px;
    opacity: 1;
    margin-top: 10px;
  }

  .exercise-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px;
    margin-bottom: 10px; display: grid; grid-template-columns: 1fr auto; gap: 10px; align-items: center; }
  .ex-name { font-weight: 600; font-size: 15px; text-transform: capitalize; margin-bottom: 4px; }
  .ex-last { font-size: 12px; color: var(--green); font-family: 'DM Mono', monospace; display: flex; align-items: center; gap: 5px; }
  .ex-last::before { content: '↑'; font-size: 10px; opacity: 0.7; }
  .ex-last.empty { color: var(--muted); }
  .ex-last.empty::before { content: '—'; }
  .ex-input { width: 130px; background: var(--input-bg); border: 1.5px solid var(--border); border-radius: var(--radius-sm);
    color: var(--text); font-family: 'DM Mono', monospace; font-size: 14px; padding: 10px 12px;
    text-align: center; outline: none; transition: border-color 0.2s; user-select: text; }
  .ex-input:focus { border-color: var(--red); }
  .ex-input::placeholder { color: var(--muted); font-size: 11px; }

  .log-btn { width: 100%; background: var(--red); color: white; border: none; border-radius: var(--radius);
    font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 2px;
    padding: 18px; cursor: pointer; margin-top: 20px;
    transition: background 0.2s, transform 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 10px; }
  .log-btn:active { background: var(--red-dim); transform: scale(0.98); }
  .log-btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }

  #toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--green); color: #0a1f14; font-weight: 600; font-size: 14px;
    padding: 12px 24px; border-radius: 999px; opacity: 0; transition: all 0.3s;
    z-index: 999; white-space: nowrap; pointer-events: none;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .history-filters, .progress-zone-filter {
    display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto;
    padding-bottom: 4px; -webkit-overflow-scrolling: touch;
  }
  .filter-chip { flex-shrink: 0; background: var(--card); border: 1.5px solid var(--border); border-radius: 999px;
    padding: 6px 14px; font-size: 12px; font-weight: 500; color: var(--muted); cursor: pointer; transition: all 0.2s; }
  .filter-chip.active { border-color: var(--red); color: var(--red); background: #2a1020; }

  .history-entry { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 13px 15px; margin-bottom: 8px;
    display: flex; justify-content: space-between; align-items: center; }
  .he-left .he-ex { font-weight: 600; font-size: 14px; text-transform: capitalize; }
  .he-left .he-zone { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
  .he-right { text-align: right; }
  .he-value { font-family: 'DM Mono', monospace; font-size: 14px; color: var(--gold); }
  .he-date { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .history-day-label { font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
    color: var(--muted); margin: 18px 0 8px; }
  .history-day-label:first-child { margin-top: 0; }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-state .es-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; line-height: 1.6; }

  .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
  .stat-value { font-family: 'Bebas Neue', sans-serif; font-size: 36px; color: var(--red); line-height: 1; }
  .stat-label { font-size: 11px; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }

  .pb-section { margin-top: 8px; }
  .pb-row { display: flex; justify-content: space-between; align-items: center;
    padding: 13px 0; border-bottom: 1px solid var(--border); }
  .pb-row:last-child { border-bottom: none; }
  .pb-ex { font-size: 13px; text-transform: capitalize; }
  .pb-val { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--gold); }

  /* ── Progress page ───────────────────────────────────── */
  .progress-exercise-list { display: flex; flex-direction: column; gap: 8px; }
  .progress-exercise-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 14px 16px;
    cursor: pointer; transition: border-color 0.2s, transform 0.15s;
    display: flex; justify-content: space-between; align-items: center;
    gap: 12px;
  }
  .progress-exercise-card:active { transform: scale(0.98); }
  .pec-name { font-weight: 600; font-size: 14px; text-transform: capitalize; }
  .pec-meta { font-size: 11px; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px; }
  .pec-trend { font-family: 'DM Mono', monospace; font-size: 12px;
    color: var(--green); display: flex; align-items: center; gap: 4px; white-space: nowrap; }
  .pec-trend.flat { color: var(--muted); }
  .pec-trend.down { color: var(--red); }

  .chart-card { background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 18px; margin-bottom: 16px; }
  .chart-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 1px;
    margin-bottom: 4px; text-transform: capitalize; }
  .chart-subtitle { font-size: 12px; color: var(--muted); margin-bottom: 16px; }
  .chart-summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 18px; }
  .cs-item { text-align: center; }
  .cs-value { font-family: 'DM Mono', monospace; font-size: 18px; color: var(--gold); font-weight: 500; }
  .cs-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
  #progress-chart-wrap { position: relative; height: 220px; width: 100%; }

  .back-btn { background: none; border: none; color: var(--muted); font-size: 13px; cursor: pointer;
    font-family: inherit; padding: 0; margin-bottom: 16px;
    display: inline-flex; align-items: center; gap: 6px; }
  .back-btn:active { color: var(--red); }

  /* ── Settings modal ──────────────────────────────────── */
  #settings-modal { position: fixed; inset: 0; background: var(--bg);
    z-index: 200; display: none; flex-direction: column; }
  #settings-modal.visible { display: flex; }
  .settings-header { flex-shrink: 0; padding: 56px 20px 16px;
    background: linear-gradient(180deg, #0a0a14 0%, var(--bg) 100%);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-end; justify-content: space-between; }
  .settings-title { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 2px; }
  .close-btn { background: var(--card); border: 1px solid var(--border); color: var(--text);
    font-size: 18px; width: 36px; height: 36px;
    border-radius: 50%; cursor: pointer;
    display: flex; align-items: center; justify-content: center; }
  .close-btn:active { background: var(--bg2); }
  #settings-body { flex: 1; overflow-y: auto; padding: 20px; }
  .settings-zone { background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); margin-bottom: 14px; overflow: hidden; }
  .sz-header { padding: 14px 16px; display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid var(--border); background: var(--bg2); }
  .sz-icon-btn {
    background: var(--card); border: 1.5px solid var(--border);
    border-radius: var(--radius-sm); width: 40px; height: 40px;
    font-size: 22px; cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.2s;
  }
  .sz-icon-btn:active { border-color: var(--red); }
  .sz-name-input {
    flex: 1; background: transparent;
    border: 1.5px solid transparent; border-radius: var(--radius-sm);
    color: var(--text); font-family: 'Bebas Neue', sans-serif;
    font-size: 18px; letter-spacing: 1.5px;
    padding: 8px 10px; outline: none;
    user-select: text; transition: border-color 0.2s, background 0.2s;
    min-width: 0;
  }
  .sz-name-input:focus { border-color: var(--red); background: var(--input-bg); }
  .sz-count { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; flex-shrink: 0; }
  .sz-zone-delete {
    background: var(--bg); border: 1px solid var(--border); color: var(--muted);
    width: 32px; height: 32px; border-radius: var(--radius-sm); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 13px; transition: color 0.2s, border-color 0.2s;
  }
  .sz-zone-delete:active { color: var(--red); border-color: var(--red); }

  .add-zone-btn {
    width: 100%; margin-top: 8px; margin-bottom: 8px;
    background: var(--card); border: 1.5px dashed var(--border);
    color: var(--green); padding: 16px;
    border-radius: var(--radius); cursor: pointer;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px; letter-spacing: 2px;
    transition: border-color 0.2s, transform 0.15s;
  }
  .add-zone-btn:active { border-color: var(--green); transform: scale(0.98); }

  .add-zone-form {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px;
    margin-bottom: 14px;
    display: none;
  }
  .add-zone-form.visible { display: block; }
  .add-zone-form-row {
    display: flex; gap: 8px; align-items: center;
    margin-bottom: 10px;
  }
  .add-zone-form-row:last-of-type { margin-bottom: 12px; }
  .add-zone-actions { display: flex; gap: 8px; }
  .add-zone-actions button { flex: 1; padding: 10px; border-radius: var(--radius-sm);
    font-family: 'Bebas Neue', sans-serif; font-size: 13px; letter-spacing: 2px;
    cursor: pointer; border: 1px solid var(--border); }
  .btn-save { background: var(--red); color: white; border-color: var(--red); }
  .btn-save:active { background: var(--red-dim); }
  .btn-cancel { background: var(--card); color: var(--muted); }
  .btn-cancel:active { background: var(--bg2); }

  .sz-body { padding: 8px 12px 12px; }
  .sz-ex-row { display: flex; gap: 8px; align-items: center; padding: 6px 0; }
  .sz-ex-input { flex: 1; background: var(--input-bg); border: 1.5px solid var(--border); border-radius: var(--radius-sm);
    color: var(--text); padding: 10px 12px; font-size: 14px;
    font-family: inherit; outline: none; user-select: text; transition: border-color 0.2s; }
  .sz-ex-input:focus { border-color: var(--red); }
  .sz-action-btn { background: var(--bg2); border: 1px solid var(--border); color: var(--muted);
    width: 36px; height: 36px; border-radius: var(--radius-sm); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 14px; transition: color 0.2s, border-color 0.2s; }
  .sz-action-btn.delete:active { color: var(--red); border-color: var(--red); }
  .sz-action-btn.add { width: 100%; margin-top: 8px;
    color: var(--green); border: 1.5px dashed var(--border);
    padding: 10px; font-size: 12px; gap: 6px;
    text-transform: uppercase; letter-spacing: 1px; font-weight: 600;
    height: auto; }
  .sz-action-btn.add:active { border-color: var(--green); }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<div id="loading">
  <div class="splash-logo">GAIN<span>Z</span></div>
  <div class="spinner"></div>
</div>

<div id="auth-screen">

<script>
const DEFAULT_ICONS = { Chest: '🫁', Arms: '💪', Shoulders: '🏔️', Back: '🦅', Abs: '🔥' };
const DEFAULT_ZONES = [
  { name: 'Chest',     icon: '🫁',   exercises: ['Pushups', 'Pec Dec', 'Chest Pullups', 'High Angle Press'] },
  { name: 'Arms',      icon: '💪',   exercises: ['Triceps Push Rope', 'Triceps Push Handles', 'Biceps Rope', 'Biceps Handle'] },
  { name: 'Shoulders', icon: '🏔️',  exercises: ['Lats', 'Shoulder Press', 'Rotations', 'Dumbbell Rotations'] },
  { name: 'Back',      icon: '🦅',   exercises: ['Pullups', 'Rows', 'Flags', 'Pulldowns'] },
  { name: 'Abs',       icon: '🔥',   exercises: ['Abs'] }
];

let zonesConfig    = JSON.parse(JSON.stringify(DEFAULT_ZONES));
let selectedZone   = null;
let historyFilter  = 'All';
let progressZoneFilter = 'All';
let historyCache   = [];
let unsubscribeHistory = null;
let unsubscribeConfig  = null;
let currentUser    = null;
let authMode       = 'login';
let progressChart  = null;

// ── Zone helpers ──
function findZone(name) { return zonesConfig.find(z => z.name === name); }
function zoneNames()    { return zonesConfig.map(z => z.name); }
function zoneIcon(name) { return findZone(name)?.icon || '🏋️'; }
function zoneExercises(name) { return findZone(name)?.exercises || []; }

window.addEventListener('firebase-ready', () => {
  const { auth, onAuthStateChanged } = window.__fb;
  const now = new Date();
  document.getElementById('hdr-day').textContent  = now.toLocaleDateString('en-GB', { weekday: 'long' });
  document.getElementById('hdr-date').textContent = now.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });

  onAuthStateChanged(auth, (user) => {
    document.getElementById('loading').style.display = 'none';
    currentUser = user;
    if (user) {
      document.getElementById('auth-screen').classList.remove('visible');
      document.getElementById('app').classList.add('visible');
      subscribeToConfig();
      subscribeToHistory();
      maybeMigrateLocalData();
    } else {
      if (unsubscribeHistory) { unsubscribeHistory(); unsubscribeHistory = null; }
      if (unsubscribeConfig)  { unsubscribeConfig();  unsubscribeConfig  = null; }
      historyCache = [];
      zonesConfig = JSON.parse(JSON.stringify(DEFAULT_ZONES));
      document.getElementById('app').classList.remove('visible');
      document.getElementById('auth-screen').classList.add('visible');
    }
  });
});

function setAuthTab(mode) {
  authMode = mode;
  document.getElementById('tab-login').classList.toggle('active', mode === 'login');
  document.getElementById('tab-signup').classList.toggle('active', mode === 'signup');
  document.getElementById('auth-submit').textContent = mode === 'login' ? 'LOG IN' : 'CREATE ACCOUNT';
  document.getElementById('auth-error').textContent = '';
  document.getElementById('auth-password').autocomplete = mode === 'login' ? 'current-password' : 'new-password';
}
async function doAuth() {
  const email = document.getElementById('auth-email').value.trim();
  const pw    = document.getElementById('auth-password').value;
  const err   = document.getElementById('auth-error');
  const btn   = document.getElementById('auth-submit');
  err.textContent = '';
  if (!email || !pw)  { err.textContent = 'Enter both email and password'; return; }
  if (pw.length < 6)  { err.textContent = 'Password must be at least 6 characters'; return; }
  btn.disabled = true;
  btn.textContent = 'Loading...';
  const { auth, signInWithEmailAndPassword, createUserWithEmailAndPassword } = window.__fb;
  try {
    if (authMode === 'login') await signInWithEmailAndPassword(auth, email, pw);
    else                       await createUserWithEmailAndPassword(auth, email, pw);
  } catch (e) {
    err.textContent = friendlyError(e.code);
  } finally {
    btn.disabled = false;
    btn.textContent = authMode === 'login' ? 'LOG IN' : 'CREATE ACCOUNT';
  }
}
function friendlyError(code) {
  const m = {
    'auth/invalid-email': 'Invalid email address',
    'auth/email-already-in-use': 'Email already registered — try logging in',
    'auth/wrong-password': 'Wrong password',
    'auth/user-not-found': 'No account with that email',
    'auth/weak-password': 'Password too weak (6+ characters)',
    'auth/network-request-failed': 'Network error — check your connection',
    'auth/invalid-credential': 'Wrong email or password'
  };
  return m[code] || 'Something went wrong — try again';
}
async function doSignOut() { await window.__fb.signOut(window.__fb.auth); }

// ── Config sync ──
function normalizeConfigData(data) {
  // New format: { version: 2, zones: [{name, icon, exercises}, ...] }
  if (data && data.version === 2 && Array.isArray(data.zones)) {
    return data.zones.map(z => ({
      name: String(z.name || ''),
      icon: String(z.icon || '🏋️'),
      exercises: Array.isArray(z.exercises) ? z.exercises.map(String) : []
    })).filter(z => z.name);
  }
  // Old format: top-level keys are zone names with arrays of exercises
  const zones = [];
  // Preserve default order for known zones
  DEFAULT_ZONES.forEach(d => {
    if (data && Array.isArray(data[d.name])) {
      zones.push({ name: d.name, icon: DEFAULT_ICONS[d.name] || '🏋️', exercises: data[d.name] });
    }
  });
  // Append any custom zones from old format
  if (data) {
    Object.keys(data).forEach(name => {
      if (Array.isArray(data[name]) && !DEFAULT_ICONS[name]) {
        zones.push({ name, icon: '🏋️', exercises: data[name] });
      }
    });
  }
  return zones.length ? zones : JSON.parse(JSON.stringify(DEFAULT_ZONES));
}

function subscribeToConfig() {
  if (!currentUser) return;
  const { db, doc, onSnapshot, setDoc } = window.__fb;
  const ref = doc(db, 'users', currentUser.uid, 'config', 'zones');
  unsubscribeConfig = onSnapshot(ref, async (snap) => {
    if (!snap.exists()) {
      try { await setDoc(ref, { version: 2, zones: DEFAULT_ZONES }); } catch(e) { console.error(e); }
      zonesConfig = JSON.parse(JSON.stringify(DEFAULT_ZONES));
    } else {
      zonesConfig = normalizeConfigData(snap.data());
    }
    buildZonesGrid();
    buildHistoryFilters();
    buildProgressFilters();
    refreshActivePage();
    // Re-render settings if open
    if (document.getElementById('settings-modal').classList.contains('visible')) {
      renderSettings();
    }
  });
}
async function saveConfig() {
  if (!currentUser) return;
  const { db, doc, setDoc } = window.__fb;
  await setDoc(doc(db, 'users', currentUser.uid, 'config', 'zones'),
    { version: 2, zones: zonesConfig });
}

// ── History sync ──
function subscribeToHistory() {
  if (!currentUser) return;
  const { db, collection, query, orderBy, onSnapshot } = window.__fb;
  showSync('Syncing...');
  const q = query(collection(db, 'users', currentUser.uid, 'entries'), orderBy('ts', 'asc'));
  unsubscribeHistory = onSnapshot(q,
    (snap) => {
      historyCache = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      hideSync();
      refreshActivePage();
    },
    (err) => {
      console.error('Sync error:', err);
      showSync('Offline', '#f5c842');
    }
  );
}
function refreshActivePage() {
  const active = document.querySelector('.page.active');
  if (!active) return;
  if (active.id === 'page-log') {
    buildZonesGrid();
    if (selectedZone) renderExercises(selectedZone);
  }
  if (active.id === 'page-history')             renderHistory();
  if (active.id === 'page-stats')               renderStats();
  if (active.id === 'page-progress')            renderProgressList();
}
async function addEntry(date, zone, exercise, value) {
  if (!currentUser) return;
  const { db, collection, addDoc, serverTimestamp } = window.__fb;
  await addDoc(collection(db, 'users', currentUser.uid, 'entries'), {
    date, zone, exercise, value, ts: serverTimestamp()
  });
}
async function renameInHistory(zone, oldName, newName) {
  if (!currentUser || oldName === newName) return;
  const { db, collection, query, where, getDocs, writeBatch } = window.__fb;
  const q = query(
    collection(db, 'users', currentUser.uid, 'entries'),
    where('zone', '==', zone),
    where('exercise', '==', oldName)
  );
  const snap = await getDocs(q);
  if (snap.empty) return;
  const batch = writeBatch(db);
  snap.forEach(d => batch.update(d.ref, { exercise: newName }));
  await batch.commit();
}

async function renameZoneInHistory(oldZoneName, newZoneName) {
  if (!currentUser || oldZoneName === newZoneName) return;
  const { db, collection, query, where, getDocs, writeBatch } = window.__fb;
  const q = query(
    collection(db, 'users', currentUser.uid, 'entries'),
    where('zone', '==', oldZoneName)
  );
  const snap = await getDocs(q);
  if (snap.empty) return;
  // Firestore batches max 500 operations
  const docs = snap.docs;
  for (let i = 0; i < docs.length; i += 500) {
    const batch = writeBatch(db);
    docs.slice(i, i + 500).forEach(d => batch.update(d.ref, { zone: newZoneName }));
    await batch.commit();
  }
}
function getLastRecord(zone, exercise) {
  const m = historyCache.filter(e => e.zone === zone && e.exercise === exercise);
  return m.length ? m[m.length - 1].value : null;
}
async function maybeMigrateLocalData() {
  setTimeout(async () => {
    if (historyCache.length > 0) return;
    let local;
    try { local = JSON.parse(localStorage.getItem('gainz_history') || '[]'); } catch { return; }
    if (!Array.isArray(local) || local.length === 0) return;
    showToast(`Importing ${local.length} entries...`, '#4f8ef7');
    for (const e of local) {
      try { await addEntry(e.date, e.zone, e.exercise, e.value); } catch (err) { console.error(err); }
    }
    localStorage.removeItem('gainz_history');
    showToast(`✅ Imported ${local.length} entries`);
  }, 1500);
}

// ── UI builders ──
function todayKey() {
  return new Date().toLocaleDateString('en-GB');
}

function getZoneStatus(zoneName) {
  const exs = zoneExercises(zoneName);
  if (exs.length === 0) return 'neutral';
  const today = todayKey();
  const todayLogged = new Set(
    historyCache
      .filter(e => e.zone === zoneName && e.date === today)
      .map(e => e.exercise)
  );
  const done = exs.filter(ex => todayLogged.has(ex)).length;
  if (done === exs.length) return 'complete';
  return 'incomplete';
}

function buildZonesGrid() {
  const grid = document.getElementById('zones-grid');
  grid.innerHTML = '';
  if (zonesConfig.length === 0) {
    grid.innerHTML = `<div class="empty-state"><p>No muscle groups yet.<br>Open Settings (⚙) to add one.</p></div>`;
    return;
  }
  zonesConfig.forEach(({ name, icon, exercises }) => {
    const block = document.createElement('div');
    block.className = 'zone-block';
    block.dataset.zone = name;

    const card = document.createElement('div');
    card.className = 'zone-card';
    if (selectedZone === name) card.classList.add('selected');
    const status = getZoneStatus(name);
    if (status === 'complete')   card.classList.add('complete');
    if (status === 'incomplete') card.classList.add('incomplete');
    card.innerHTML = `
      <div class="zone-icon">${escapeHtml(icon || '🏋️')}</div>
      <div class="zone-info">
        <div class="zone-name">${escapeHtml(name)}</div>
        <div class="zone-count">${exercises.length} exercise${exercises.length === 1 ? '' : 's'}</div>
      </div>
      <div class="zone-check">✓</div>
      <svg class="zone-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="6 9 12 15 18 9"/>
      </svg>
    `;
    card.onclick = () => toggleZone(name);
    block.appendChild(card);

    const exArea = document.createElement('div');
    exArea.className = 'zone-exercises';
    if (selectedZone === name) exArea.classList.add('expanded');
    exArea.id = `zone-ex-${cssId(name)}`;
    if (selectedZone === name) renderExercisesInto(exArea, name);
    block.appendChild(exArea);

    grid.appendChild(block);
  });
}

function cssId(s) { return String(s).replace(/[^a-zA-Z0-9_-]/g, '_'); }

function toggleZone(zone) {
  if (selectedZone === zone) {
    // collapse
    selectedZone = null;
    buildZonesGrid();
  } else {
    selectedZone = zone;
    buildZonesGrid();
    // smooth scroll to the now-open zone
    setTimeout(() => {
      const block = document.querySelector(`.zone-block[data-zone="${cssCssEscape(zone)}"]`);
      if (block) block.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 80);
  }
}
function cssCssEscape(s) { return String(s).replace(/"/g, '\\"'); }

// kept for backwards-compat with any external callers
function selectZone(zone) { toggleZone(zone); }
function buildHistoryFilters() {
  const f = document.getElementById('history-filters');
  f.innerHTML = '';
  const all = document.createElement('div');
  all.className = 'filter-chip' + (historyFilter === 'All' ? ' active' : '');
  all.textContent = 'All';
  all.onclick = function() { filterHistory('All', this); };
  f.appendChild(all);
  zoneNames().forEach(zone => {
    const chip = document.createElement('div');
    chip.className = 'filter-chip' + (historyFilter === zone ? ' active' : '');
    chip.textContent = zone;
    chip.onclick = function() { filterHistory(zone, this); };
    f.appendChild(chip);
  });
}
function buildProgressFilters() {
  const f = document.getElementById('progress-zone-filter');
  f.innerHTML = '';
  const all = document.createElement('div');
  all.className = 'filter-chip' + (progressZoneFilter === 'All' ? ' active' : '');
  all.textContent = 'All';
  all.onclick = function() { filterProgress('All', this); };
  f.appendChild(all);
  zoneNames().forEach(zone => {
    const chip = document.createElement('div');
    chip.className = 'filter-chip' + (progressZoneFilter === zone ? ' active' : '');
    chip.textContent = zone;
    chip.onclick = function() { filterProgress(zone, this); };
    f.appendChild(chip);
  });
}

function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'history')  renderHistory();
  if (name === 'stats')    renderStats();
  if (name === 'progress') { closeProgressDetail(); renderProgressList(); }
}

function renderExercises(zone) {
  // Re-render the currently expanded exercise area for a given zone (e.g. after sync)
  const area = document.getElementById(`zone-ex-${cssId(zone)}`);
  if (!area) return;
  if (!area.classList.contains('expanded')) return;
  // preserve current input values
  const current = {};
  area.querySelectorAll('input').forEach(i => { current[i.dataset.idx] = i.value; });
  renderExercisesInto(area, zone, current);
}

function renderExercisesInto(area, zone, preserved = {}) {
  const exs = zoneExercises(zone);
  if (exs.length === 0) {
    area.innerHTML = `
      <div class="empty-state" style="padding: 30px 16px">
        <p>No exercises in this group yet.<br>Open Settings to add some.</p>
      </div>
    `;
    return;
  }

  let html = '<div class="exercises-inner">';
  exs.forEach((ex, i) => {
    const last = getLastRecord(zone, ex);
    html += `
      <div class="exercise-card">
        <div>
          <div class="ex-name">${escapeHtml(ex)}</div>
          <div class="ex-last ${last ? '' : 'empty'}">${last ? escapeHtml(last) : 'No record yet'}</div>
        </div>
        <input class="ex-input" data-zone="${escapeHtml(zone)}" data-idx="${i}" type="text" inputmode="text"
               placeholder="e.g. 80kg 3×10" autocomplete="off" spellcheck="false"
               value="${escapeHtml(preserved[i] || '')}">
      </div>
    `;
  });
  html += `<button class="log-btn" data-zone="${escapeHtml(zone)}"><span>LOG ${escapeHtml(zone).toUpperCase()}</span></button>`;
  html += '</div>';
  area.innerHTML = html;

  area.querySelector('.log-btn').addEventListener('click', () => logWorkout(zone));
}

async function logWorkout(zone) {
  zone = zone || selectedZone;
  if (!zone || !currentUser) return;
  const exs = zoneExercises(zone);
  const today = new Date().toLocaleDateString('en-GB');
  const area = document.getElementById(`zone-ex-${cssId(zone)}`);
  if (!area) return;

  let logged = 0;
  showSync('Saving...');
  const writes = [];
  exs.forEach((ex, i) => {
    const input = area.querySelector(`input[data-idx="${i}"]`);
    const val = input ? input.value.trim() : '';
    if (val) { writes.push(addEntry(today, zone, ex, val)); logged++; }
  });
  if (logged === 0) {
    hideSync();
    showToast('Fill in at least one exercise! 📝', '#ff3c5f');
    return;
  }
  try {
    await Promise.all(writes);
    area.querySelectorAll('input').forEach(i => i.value = '');
    hideSync();
    showToast(`✅ ${logged} exercise${logged > 1 ? 's' : ''} logged!`);
  } catch (e) {
    console.error(e);
    hideSync();
    showToast('Saved locally, will sync when online', '#f5c842');
  }
}

function filterHistory(zone, chipEl) {
  historyFilter = zone;
  document.querySelectorAll('#history-filters .filter-chip').forEach(c => c.classList.remove('active'));
  chipEl.classList.add('active');
  renderHistory();
}
function renderHistory() {
  const list = document.getElementById('history-list');
  let data = historyCache.slice().reverse();
  if (historyFilter !== 'All') data = data.filter(e => e.zone === historyFilter);
  if (!data.length) {
    list.innerHTML = `<div class="empty-state"><div class="es-icon">🏋️</div><p>No workouts yet.<br>Start logging and your history will appear here.</p></div>`;
    return;
  }
  const grouped = {};
  data.forEach(e => { (grouped[e.date] = grouped[e.date] || []).push(e); });
  list.innerHTML = '';
  Object.entries(grouped).forEach(([date, entries], gi) => {
    const label = document.createElement('div');
    label.className = 'history-day-label';
    label.textContent = formatDateLabel(date);
    list.appendChild(label);
    entries.forEach((e, ei) => {
      const row = document.createElement('div');
      row.className = 'history-entry';
      if (gi === 0 && ei === 0) row.style.borderColor = 'var(--red)';
      row.innerHTML = `
        <div class="he-left"><div class="he-ex">${escapeHtml(e.exercise)}</div><div class="he-zone">${escapeHtml(e.zone)}</div></div>
        <div class="he-right"><div class="he-value">${escapeHtml(e.value)}</div><div class="he-date">${escapeHtml(e.date)}</div></div>
      `;
      list.appendChild(row);
    });
  });
}
function formatDateLabel(dateStr) {
  const [d, m, y] = dateStr.split('/');
  const date = new Date(y, m - 1, d);
  const today = new Date(); today.setHours(0,0,0,0);
  const diff = Math.round((today - date) / 86400000);
  if (diff === 0) return 'Today';
  if (diff === 1) return 'Yesterday';
  if (diff < 7)   return date.toLocaleDateString('en-GB', { weekday: 'long' });
  return date.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
}

function renderStats() {
  const totalSessions = new Set(historyCache.map(e => e.date + e.zone)).size;
  const totalEntries  = historyCache.length;
  const streak        = calcStreak(historyCache);
  const topZone       = calcTopZone(historyCache);
  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card"><div class="stat-value">${totalSessions}</div><div class="stat-label">Sessions</div></div>
    <div class="stat-card"><div class="stat-value">${streak}</div><div class="stat-label">Day streak 🔥</div></div>
    <div class="stat-card"><div class="stat-value">${totalEntries}</div><div class="stat-label">Sets logged</div></div>
    <div class="stat-card"><div class="stat-value">${topZone || '—'}</div><div class="stat-label">Fav zone</div></div>
  `;
  const pb = document.getElementById('pb-section');
  const bests = {};
  historyCache.forEach(e => { bests[e.exercise] = e.value; });
  if (!Object.keys(bests).length) {
    pb.innerHTML = '<div class="empty-state" style="padding:30px 0"><p>Log your first workout to see personal bests.</p></div>';
    return;
  }
  pb.innerHTML = Object.entries(bests).map(([ex, val]) =>
    `<div class="pb-row"><div class="pb-ex">${escapeHtml(ex)}</div><div class="pb-val">${escapeHtml(val)}</div></div>`
  ).join('');
}
function calcStreak(history) {
  const dates = [...new Set(history.map(e => e.date))].sort().reverse();
  if (!dates.length) return 0;
  let streak = 0;
  const today = new Date(); today.setHours(0,0,0,0);
  for (let i = 0; i < dates.length; i++) {
    const [d, m, y] = dates[i].split('/');
    const date = new Date(y, m-1, d);
    const diff = Math.round((today - date) / 86400000);
    if (diff === i || diff === i + 1) streak++;
    else break;
  }
  return streak;
}
function calcTopZone(history) {
  const counts = {};
  history.forEach(e => { counts[e.zone] = (counts[e.zone] || 0) + 1; });
  return Object.entries(counts).sort((a,b) => b[1]-a[1])[0]?.[0] || null;
}

// ── Progress page ──
function extractWeight(str) {
  if (!str) return null;
  const s = String(str);
  const kg = s.match(/(\d+(?:\.\d+)?)\s*kg/i);
  if (kg) return parseFloat(kg[1]);
  const lb = s.match(/(\d+(?:\.\d+)?)\s*lb/i);
  if (lb) return parseFloat(lb[1]);
  const nums = s.match(/\d+(?:\.\d+)?/g);
  if (!nums) return null;
  return Math.max(...nums.map(parseFloat));
}
function filterProgress(zone, chipEl) {
  progressZoneFilter = zone;
  document.querySelectorAll('#progress-zone-filter .filter-chip').forEach(c => c.classList.remove('active'));
  chipEl.classList.add('active');
  renderProgressList();
}
function renderProgressList() {
  const list = document.getElementById('progress-list');
  const showZones = progressZoneFilter === 'All' ? zoneNames() : [progressZoneFilter];
  const items = [];
  showZones.forEach(zone => {
    zoneExercises(zone).forEach(ex => {
      const entries = historyCache.filter(e => e.zone === zone && e.exercise === ex);
      const weights = entries.map(e => extractWeight(e.value)).filter(n => n !== null);
      let trend = 'flat', label = '—';
      if (weights.length >= 2) {
        const first = weights[0], last = weights[weights.length - 1];
        const delta = last - first;
        const pct = first > 0 ? Math.round((delta / first) * 100) : 0;
        if (delta > 0)      { trend = 'up';   label = `+${(Math.round(delta * 10) / 10)} (${pct >= 0 ? '+' : ''}${pct}%)`; }
        else if (delta < 0) { trend = 'down'; label = `${(Math.round(delta * 10) / 10)} (${pct}%)`; }
        else                { trend = 'flat'; label = 'no change'; }
      } else if (weights.length === 1) {
        label = '1 record';
      } else if (entries.length > 0) {
        label = `${entries.length} entries`;
      }
      items.push({ zone, exercise: ex, count: entries.length, trend, label });
    });
  });
  if (items.every(i => i.count === 0)) {
    list.innerHTML = `<div class="empty-state"><div class="es-icon">📈</div><p>No data yet.<br>Log a few workouts to see your progress.</p></div>`;
    return;
  }
  list.innerHTML = '';
  items.forEach(it => {
    const card = document.createElement('div');
    card.className = 'progress-exercise-card';
    if (it.count === 0) card.style.opacity = '0.45';
    card.innerHTML = `
      <div style="min-width:0; flex:1">
        <div class="pec-name">${escapeHtml(it.exercise)}</div>
        <div class="pec-meta">${escapeHtml(it.zone)} · ${it.count} entr${it.count === 1 ? 'y' : 'ies'}</div>
      </div>
      <div class="pec-trend ${it.trend}">
        ${it.trend === 'up' ? '↗' : it.trend === 'down' ? '↘' : '→'} ${escapeHtml(it.label)}
      </div>
    `;
    if (it.count > 0) card.onclick = () => openProgressDetail(it.zone, it.exercise);
    list.appendChild(card);
  });
}
function openProgressDetail(zone, exercise) {
  document.getElementById('progress-list-view').style.display = 'none';
  document.getElementById('progress-detail-view').style.display = 'block';
  document.getElementById('chart-title').textContent = exercise;
  document.getElementById('chart-subtitle').textContent = zone;

  const entries = historyCache.filter(e => e.zone === zone && e.exercise === exercise);
  const points = entries.map(e => ({ ...e, weight: extractWeight(e.value) })).filter(e => e.weight !== null);

  const weights = points.map(p => p.weight);
  const minW  = weights.length ? Math.min(...weights) : 0;
  const maxW  = weights.length ? Math.max(...weights) : 0;
  const lastW = weights.length ? weights[weights.length - 1] : 0;

  document.getElementById('chart-summary').innerHTML = `
    <div class="cs-item"><div class="cs-value">${formatNum(minW)}</div><div class="cs-label">Min</div></div>
    <div class="cs-item"><div class="cs-value">${formatNum(lastW)}</div><div class="cs-label">Latest</div></div>
    <div class="cs-item"><div class="cs-value">${formatNum(maxW)}</div><div class="cs-label">Best</div></div>
  `;

  if (progressChart) { progressChart.destroy(); progressChart = null; }

  const wrap = document.getElementById('progress-chart-wrap');
  if (points.length === 0) {
    wrap.innerHTML = '<div class="empty-state" style="padding:30px 0"><p>No numeric data found.<br>Try entries like "80kg 3×10".</p></div>';
  } else {
    wrap.innerHTML = '<canvas id="progress-chart"></canvas>';
    const ctx = document.getElementById('progress-chart').getContext('2d');
    const grad = ctx.createLinearGradient(0, 0, 0, 220);
    grad.addColorStop(0, 'rgba(255, 60, 95, 0.35)');
    grad.addColorStop(1, 'rgba(255, 60, 95, 0)');

    progressChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: points.map(p => p.date),
        datasets: [{
          label: 'Weight',
          data: points.map(p => p.weight),
          borderColor: '#ff3c5f',
          backgroundColor: grad,
          borderWidth: 2.5,
          tension: 0.3,
          fill: true,
          pointBackgroundColor: '#ff3c5f',
          pointBorderColor: '#0d0d1a',
          pointBorderWidth: 2,
          pointRadius: 4,
          pointHoverRadius: 6
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#1e1e30', titleColor: '#f0f0f8',
            bodyColor: '#f5c842', borderColor: '#2a2a40', borderWidth: 1,
            padding: 10, displayColors: false,
            callbacks: { label: ctx => `${ctx.parsed.y}` }
          }
        },
        scales: {
          x: {
            ticks: { color: '#7070a0', font: { size: 10, family: 'DM Mono' }, maxRotation: 0, autoSkip: true, maxTicksLimit: 5 },
            grid: { color: '#2a2a40' }
          },
          y: {
            ticks: { color: '#7070a0', font: { size: 10, family: 'DM Mono' } },
            grid: { color: '#2a2a40' },
            beginAtZero: false
          }
        }
      }
    });
  }

  const entriesList = document.getElementById('progress-entries');
  if (entries.length === 0) entriesList.innerHTML = '';
  else entriesList.innerHTML = entries.slice().reverse().map(e => `
    <div class="history-entry">
      <div class="he-left"><div class="he-ex">${escapeHtml(e.exercise)}</div><div class="he-zone">${escapeHtml(e.zone)}</div></div>
      <div class="he-right"><div class="he-value">${escapeHtml(e.value)}</div><div class="he-date">${escapeHtml(e.date)}</div></div>
    </div>
  `).join('');
}
function closeProgressDetail() {
  document.getElementById('progress-list-view').style.display = 'block';
  document.getElementById('progress-detail-view').style.display = 'none';
  if (progressChart) { progressChart.destroy(); progressChart = null; }
}
function formatNum(n) {
  if (n === null || n === undefined) return '—';
  return Number.isInteger(n) ? String(n) : (Math.round(n * 10) / 10).toString();
}

// ── Settings ──
const ICON_CHOICES = ['🫁','💪','🏔️','🦅','🔥','🦵','🏃','🧘','🤸','🏋️','⚡','🎯','🥊','💥','🦴','🍑','💧','🧠'];
let zonePendingDelete = null;

function openSettings() {
  document.getElementById('settings-modal').classList.add('visible');
  renderSettings();
}
function closeSettings() {
  document.getElementById('settings-modal').classList.remove('visible');
}

function renderSettings() {
  const body = document.getElementById('settings-zones');
  body.innerHTML = '';

  zonesConfig.forEach((zone, zIdx) => {
    const zd = document.createElement('div');
    zd.className = 'settings-zone';
    zd.innerHTML = `
      <div class="sz-header">
        <button class="sz-icon-btn" onclick="cycleZoneIcon(${zIdx})" title="Tap to change icon">${escapeHtml(zone.icon)}</button>
        <input class="sz-name-input" type="text" value="${escapeHtml(zone.name)}"
               data-zidx="${zIdx}" data-original="${escapeHtml(zone.name)}">
        <div class="sz-count">${zone.exercises.length} ex</div>
        <button class="sz-zone-delete" onclick="deleteZone(${zIdx})" title="Delete zone">🗑</button>
      </div>
      <div class="sz-body" id="sz-body-${zIdx}"></div>
    `;
    body.appendChild(zd);

    const sub = document.getElementById(`sz-body-${zIdx}`);
    zone.exercises.forEach((ex, eIdx) => {
      const row = document.createElement('div');
      row.className = 'sz-ex-row';
      row.innerHTML = `
        <input class="sz-ex-input" type="text" value="${escapeHtml(ex)}"
               data-zidx="${zIdx}" data-eidx="${eIdx}" data-original="${escapeHtml(ex)}">
        <button class="sz-action-btn delete" onclick="deleteExercise(${zIdx}, ${eIdx})">🗑</button>
      `;
      sub.appendChild(row);
    });
    const addBtn = document.createElement('button');
    addBtn.className = 'sz-action-btn add';
    addBtn.textContent = '+ Add exercise';
    addBtn.onclick = () => addExercise(zIdx);
    sub.appendChild(addBtn);
  });

  // "Add new muscle group" button
  const addZoneBtn = document.createElement('button');
  addZoneBtn.className = 'add-zone-btn';
  addZoneBtn.textContent = '+ Add Muscle Group';
  addZoneBtn.onclick = showAddZoneForm;
  body.appendChild(addZoneBtn);

  // Add-zone form (hidden by default)
  const form = document.createElement('div');
  form.className = 'add-zone-form';
  form.id = 'add-zone-form';
  form.innerHTML = `
    <div class="add-zone-form-row">
      <button class="sz-icon-btn" id="new-zone-icon-btn" onclick="cycleNewZoneIcon()">🏋️</button>
      <input class="sz-name-input" id="new-zone-name" type="text" placeholder="Group name (e.g. Legs)" style="border-color: var(--border); background: var(--input-bg)">
    </div>
    <div class="add-zone-actions">
      <button class="btn-cancel" onclick="hideAddZoneForm()">Cancel</button>
      <button class="btn-save" onclick="saveNewZone()">Add</button>
    </div>
  `;
  body.appendChild(form);

  // Zone-name blur handler
  document.querySelectorAll('.sz-name-input').forEach(inp => {
    inp.addEventListener('blur', async (e) => {
      const zIdx = parseInt(e.target.dataset.zidx, 10);
      const orig = e.target.dataset.original;
      const newName = e.target.value.trim();
      if (!newName) { e.target.value = orig; return; }
      if (newName === orig) return;
      // prevent duplicates
      if (zonesConfig.some((z, i) => i !== zIdx && z.name === newName)) {
        showToast(`"${newName}" already exists`, '#ff3c5f');
        e.target.value = orig;
        return;
      }
      zonesConfig[zIdx].name = newName;
      e.target.dataset.original = newName;
      // Update selected zone reference if it was renamed
      if (selectedZone === orig) selectedZone = newName;
      if (historyFilter === orig) historyFilter = newName;
      if (progressZoneFilter === orig) progressZoneFilter = newName;
      showSync('Saving...');
      try {
        await Promise.all([ saveConfig(), renameZoneInHistory(orig, newName) ]);
        hideSync();
        showToast(`Renamed to "${newName}"`);
      } catch (err) {
        console.error(err);
        hideSync();
        showToast('Save failed', '#ff3c5f');
      }
    });
  });

  // Exercise blur handler
  document.querySelectorAll('.sz-ex-input').forEach(inp => {
    inp.addEventListener('blur', async (e) => {
      const zIdx = parseInt(e.target.dataset.zidx, 10);
      const eIdx = parseInt(e.target.dataset.eidx, 10);
      const orig = e.target.dataset.original;
      const newName = e.target.value.trim();
      if (!newName) { e.target.value = orig; return; }
      if (newName === orig) return;
      const zoneName = zonesConfig[zIdx].name;
      zonesConfig[zIdx].exercises[eIdx] = newName;
      e.target.dataset.original = newName;
      showSync('Saving...');
      try {
        await Promise.all([ saveConfig(), renameInHistory(zoneName, orig, newName) ]);
        hideSync();
        showToast(`Renamed to "${newName}"`);
      } catch (err) {
        console.error(err);
        hideSync();
        showToast('Save failed', '#ff3c5f');
      }
    });
  });
}

async function cycleZoneIcon(zIdx) {
  const cur = zonesConfig[zIdx].icon;
  const idx = ICON_CHOICES.indexOf(cur);
  const next = ICON_CHOICES[(idx + 1) % ICON_CHOICES.length];
  zonesConfig[zIdx].icon = next;
  showSync('Saving...');
  try {
    await saveConfig();
    hideSync();
  } catch (err) { hideSync(); }
  renderSettings();
}

let newZoneIconIdx = 9; // 🏋️
function cycleNewZoneIcon() {
  newZoneIconIdx = (newZoneIconIdx + 1) % ICON_CHOICES.length;
  document.getElementById('new-zone-icon-btn').textContent = ICON_CHOICES[newZoneIconIdx];
}
function showAddZoneForm() {
  document.getElementById('add-zone-form').classList.add('visible');
  const inp = document.getElementById('new-zone-name');
  inp.value = '';
  setTimeout(() => inp.focus(), 50);
}
function hideAddZoneForm() {
  document.getElementById('add-zone-form').classList.remove('visible');
}
async function saveNewZone() {
  const name = document.getElementById('new-zone-name').value.trim();
  if (!name) { showToast('Enter a group name', '#ff3c5f'); return; }
  if (zonesConfig.some(z => z.name === name)) {
    showToast(`"${name}" already exists`, '#ff3c5f');
    return;
  }
  zonesConfig.push({ name, icon: ICON_CHOICES[newZoneIconIdx], exercises: [] });
  showSync('Saving...');
  try {
    await saveConfig();
    hideSync();
    showToast(`Added "${name}"`);
    hideAddZoneForm();
    renderSettings();
  } catch (err) { hideSync(); showToast('Save failed', '#ff3c5f'); }
}

async function deleteZone(zIdx) {
  const zone = zonesConfig[zIdx];
  const name = zone.name;
  const exCount = zone.exercises.length;
  if (!confirm(
    `Delete muscle group "${name}"?\n\n` +
    `This removes the group and all ${exCount} of its exercise${exCount === 1 ? '' : 's'} from the tracker.\n\n` +
    `Past history entries are preserved.`
  )) return;

  zonesConfig.splice(zIdx, 1);
  if (selectedZone === name) selectedZone = null;
  if (historyFilter === name) historyFilter = 'All';
  if (progressZoneFilter === name) progressZoneFilter = 'All';

  showSync('Saving...');
  try {
    await saveConfig();
    hideSync();
    showToast(`Removed "${name}"`);
    renderSettings();
  } catch (err) { hideSync(); showToast('Save failed', '#ff3c5f'); }
}

async function addExercise(zIdx) {
  const zoneName = zonesConfig[zIdx].name;
  const name = prompt(`New exercise name for ${zoneName}:`);
  if (!name || !name.trim()) return;
  const trimmed = name.trim();
  if (zonesConfig[zIdx].exercises.includes(trimmed)) {
    showToast(`"${trimmed}" already exists in ${zoneName}`, '#ff3c5f');
    return;
  }
  zonesConfig[zIdx].exercises.push(trimmed);
  showSync('Saving...');
  try {
    await saveConfig();
    hideSync();
    showToast(`Added "${trimmed}"`);
    renderSettings();
  } catch (err) { hideSync(); showToast('Save failed', '#ff3c5f'); }
}

async function deleteExercise(zIdx, eIdx) {
  const name = zonesConfig[zIdx].exercises[eIdx];
  if (!confirm(`Remove "${name}" from ${zonesConfig[zIdx].name}?\n\nYour past history will keep these entries.`)) return;
  zonesConfig[zIdx].exercises.splice(eIdx, 1);
  showSync('Saving...');
  try {
    await saveConfig();
    hideSync();
    showToast(`Removed "${name}"`);
    renderSettings();
  } catch (err) { hideSync(); showToast('Save failed', '#ff3c5f'); }
}

// ── Helpers ──
function escapeHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#039;');
}
function escapeAttr(s) {
  return String(s == null ? '' : s).replace(/'/g, "\\'");
}
function showToast(msg, color = '#39d98a') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = color;
  t.style.color = (color === '#39d98a') ? '#0a1f14' : 'white';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}
function showSync(text = 'Syncing...', color = '#39d98a') {
  const ind = document.getElementById('sync-indicator');
  document.getElementById('sync-text').textContent = text;
  ind.querySelector('.dot').style.background = color;
  ind.classList.add('show');
}
function hideSync() {
  setTimeout(() => document.getElementById('sync-indicator').classList.remove('show'), 600);
}

  openSettings, closeSettings,
  addExercise, deleteExercise,
  cycleZoneIcon, deleteZone,
  showAddZoneForm, hideAddZoneForm, saveNewZone, cycleNewZoneIcon
});
